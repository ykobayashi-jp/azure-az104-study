  {domain:"ストレージ",cat:"Azure Blob Storage",diff:"Easy",q:"Azure Blob Storageには3種類のBlobタイプがある。大きなバイナリファイル（動画・バックアップ）の保存に最も適したBlobタイプはどれか？",opts:["Page Blob（ページBLOB）","Append Blob（追加BLOB）","Block Blob（ブロックBLOB）","File Blob"],ans:2,why:"Block Blobはデータをブロック単位で管理し、大容量のバイナリファイル（動画・バックアップ・イメージ）の保存に最適化されている。最大約190.7TBまで保存でき、並列アップロードも可能。ほとんどのシナリオでBlock Blobが標準的な選択肢。",trap:"Page BlobはAzure VMのOSディスク・データディスク（VHD）用に最適化されておりランダム読み書きが得意。Append Blobはログファイルなど末尾への追記専用で更新・削除ができない。File BlobというBlobタイプは存在しない。",cmp:[{svc:"Block Blob",feature:"大容量・並列アップロード",rto:"即時",cost:"低〜中",note:"✓ 汎用・動画・バックアップ"},{svc:"Page Blob",feature:"ランダムR/W最適化",rto:"低レイテンシー",cost:"中",note:"VMディスク（VHD）用"},{svc:"Append Blob",feature:"末尾追記専用",rto:"即時",cost:"低",note:"ログファイル用"}],kws:["Block Blob","Page Blob","Append Blob","Blobタイプ","VHD","バックアップ"]},
  {domain:"ストレージ",cat:"冗長性",diff:"Easy",q:"Azure Storageアカウントの冗長性オプションについて、同一リージョン内の3つのAvailability Zoneにデータをコピーしてゾーン障害から保護するオプションはどれか？",opts:["LRS（ローカル冗長ストレージ）","ZRS（ゾーン冗長ストレージ）","GRS（地理冗長ストレージ）","RA-GRS（読み取りアクセス地理冗長）"],ans:1,why:"ZRS（Zone-Redundant Storage）はプライマリリージョン内の3つの異なるAvailability Zone（AZ）にデータを同期的にコピーする。1つのAZが障害になっても他のAZからデータにアクセスできる。LRSより高い可用性を提供しつつリージョン内に留まるためGRSより低コスト。",trap:"LRSは同一データセンター内の3つのノードにコピーするだけでゾーン障害には対応しない。GRSはリージョン間の冗長化でゾーン冗長もするがコストが高い。RA-GRSはGRSにセカンダリからの読み取りを追加したオプション。",cmp:[{svc:"LRS",feature:"同一DC内3コピー",rto:"即時",cost:"最安",note:"ゾーン障害リスクあり"},{svc:"ZRS",feature:"3AZ同期コピー",rto:"即時",cost:"中",note:"✓ ゾーン障害対応"},{svc:"GRS",feature:"セカンダリリージョンへも",rto:"リージョン障害対応",cost:"高",note:"リージョン+ゾーン障害対応"}],kws:["ZRS","ゾーン冗長","Availability Zone","LRS","GRS","冗長性"]},
  {domain:"ストレージ",cat:"Azure Files",diff:"Medium",q:"Azure Filesで作成したファイル共有をWindowsサーバーにネットワークドライブとしてマウントしたい。使用するプロトコルとデフォルトのポート番号の組み合わせとして正しいのはどれか？",opts:["NFS、ポート2049","SMB（Server Message Block）、ポート445","FTP、ポート21","SFTP、ポート22"],ans:1,why:"Azure FilesはWindowsとの互換性のためSMB（Server Message Block）プロトコルをサポートしており、デフォルトポートは445。WindowsのネットワークドライブマウントはSMBを使用する。また、LinuxクライアントからもSMBクライアント（cifs-utils）でマウントできる。",trap:"NFSはAzure FilesのPremium tierで対応しているがLinux向けでWindowsネットワークドライブには通常使わない。FTP・SFTPはAzure Blob Storageが対応するプロトコルでFilesとは別。ポート445が企業ファイアウォールでブロックされている場合はHTTPS（443）経由のマウントも可能。",cmp:[{svc:"SMB（445）",feature:"Windows/Linux対応・ネットワークドライブ",rto:"即時",cost:"Standard/Premium",note:"✓ 推奨"},{svc:"NFS（2049）",feature:"Linux特化・高パフォーマンス",rto:"即時",cost:"Premium tier必要",note:"Linux向け"},{svc:"REST API",feature:"プログラマティックアクセス",rto:"HTTP/HTTPS",cost:"無料",note:"ドライブマウントには不可"}],kws:["Azure Files","SMB","ポート445","ネットワークドライブ","マウント","NFS"]},
  {domain:"ストレージ",cat:"Azure Disk",diff:"Medium",q:"Azure VMのOSディスクとして使用するマネージドディスクのタイプを選択したい。高いIOPS（毎秒I/O操作数）とスループットが必要だが、コストも最適化したい。データベースサーバー用途。最適なディスクタイプは？",opts:["Standard HDD","Standard SSD","Premium SSD","Ultra Disk"],ans:2,why:"Premium SSDはSSDベースのマネージドディスクで、高いIOPSとスループット（最大20,000 IOPS）を提供する。データベースサーバーのような高IOPSが必要な本番ワークロードに適しており、Ultra Diskより低コストで多くのVMサイズに対応している。",trap:"Standard HDDは最も安価だがIOPSが低く開発環境向け。Standard SSDはHDDより高性能だが高負荷のDB用途にはIOPSが不足。Ultra DiskはミッションクリティカルなDBに最適だがコストが非常に高く、対応するVMサイズやリージョンが限定される。",cmp:[{svc:"Standard HDD",feature:"低コスト",rto:"低IOPS",cost:"最安",note:"開発・テスト向け"},{svc:"Standard SSD",feature:"中程度",rto:"中IOPS",cost:"低",note:"軽負荷用途"},{svc:"Premium SSD",feature:"高IOPS・高スループット",rto:"低レイテンシー",cost:"中",note:"✓ 本番DB推奨"},{svc:"Ultra Disk",feature:"最高IOPS",rto:"最低レイテンシー",cost:"高",note:"超高負荷DB向け"}],kws:["Premium SSD","マネージドディスク","IOPS","データベース","Standard SSD","Ultra Disk"]},
  {domain:"ストレージ",cat:"セキュリティ",diff:"Medium",q:"Azure Storageアカウントに保存されているデータを暗号化したい。Microsoftが管理する暗号化キーではなく、自社で管理するキーを使用して暗号化したい。最適な方法は？",opts:["クライアントサイドでファイルを暗号化してからアップロード","Azure Storageのサーバーサイド暗号化（SSE）でCustomer-Managed Keys（CMK）をAzure Key Vaultに保存","AzureのデフォルトのMicrosoft管理キーで十分","ストレージアカウントにIPアドレス制限を設定"],ans:1,why:"Azure Storage Server-Side Encryption（SSE）はデフォルトでMicrosoftが管理するキーで暗号化するが、Customer-Managed Keys（CMK）を選択することで自社がAzure Key Vaultで管理するキーを使用できる。キーのローテーション・失効・監査ログをKey Vaultで制御できる。",trap:"クライアントサイド暗号化は実装が複雑でキー管理も自社で行う必要がある（CMKより管理負担が大きい）。Microsoftが管理するキーは自社でコントロールできない。IPアドレス制限はアクセス制御でデータ暗号化とは別の機能。",cmp:[{svc:"CMK（Azure Key Vault）",feature:"自社管理キー・監査・ローテーション",rto:"即時",cost:"Key Vault料金",note:"✓ 推奨"},{svc:"Microsoft管理キー",feature:"デフォルト・管理不要",rto:"即時",cost:"無料",note:"自社でキー制御不可"},{svc:"クライアントサイド暗号化",feature:"完全な制御",rto:"実装コスト",cost:"無料",note:"実装複雑・管理負担大"}],kws:["CMK","Customer-Managed Keys","SSE","Key Vault","サーバーサイド暗号化","データ保護"]},
  {domain:"ストレージ",cat:"Azure Blob Storage",diff:"Hard",q:"マルチリージョンのWebアプリから大量の静的コンテンツ（画像・CSS・JS）をAzure Blob Storageに保存して配信したい。世界中のユーザーに低レイテンシーで配信したい。最適な構成は？",opts:["ストレージアカウントをGRSに設定するだけ","Blob Storageに静的コンテンツを配置してAzure CDN（Content Delivery Network）を前面に設定","各リージョンにストレージアカウントを作成して手動同期","Azure Front Doorを使ってBlob Storageに直接ルーティング"],ans:1,why:"Azure CDNはBlobのコンテンツをグローバルなエッジノード（POP）にキャッシュし、ユーザーから最も近いPOPからコンテンツを配信する。オリジンへのリクエストを削減しレイテンシーを大幅に低下させる。Blob StorageのStatic Websiteと組み合わせることでサーバーレスな静的サイト配信が実現できる。",trap:"GRSはリージョン間のデータ冗長化でCDNのようなエッジキャッシュ配信ではない。手動で各リージョンにストレージを作成して同期するのは管理コストが高く、データの一貫性維持も困難。Front DoorはCDN機能も持つがBlobの静的コンテンツ配信にはAzure CDNが一般的でシンプル。",cmp:[{svc:"Blob Storage＋Azure CDN",feature:"エッジキャッシュ・グローバル配信",rto:"エッジから即時",cost:"CDN転送量",note:"✓ 推奨"},{svc:"GRSのみ",feature:"リージョン冗長",rto:"オリジンから配信",cost:"GRS料金",note:"CDN効果なし"},{svc:"Azure Front Door",feature:"グローバルL7・WAF・CDN",rto:"エッジから即時",cost:"高",note:"静的配信のみなら過剰"}],kws:["Azure CDN","Blob Storage","静的コンテンツ","エッジキャッシュ","低レイテンシー","Static Website"]},
  {domain:"ストレージ",cat:"Azure Blob Storage",diff:"Medium",q:"Azure Blob Storageに保存された重要データを誤削除や上書きから保護したい。削除されたBlobを30日間は復元できるようにしたい。最適な機能は？",opts:["ストレージアカウントをRead-Only ロックで保護","Blob Storageのソフト削除（Soft Delete）を有効化して保持期間を30日に設定","GRSを有効化してセカンダリにコピー","毎日スナップショットを手動で作成"],ans:1,why:"Blob ソフト削除（Soft Delete）は削除または上書きされたBlobを指定した保持期間（1〜365日）の間「論理削除」状態で保持する機能。保持期間内であればAzureポータルやAPIから復元（Undelete）できる。コンテナのソフト削除も合わせて有効化するとコンテナごとの誤削除にも対応できる。",trap:"Read-Onlyロックは書き込みと削除を完全ブロックするため通常のBlobアップロードもできなくなり実用的でない。GRSはリージョン障害対策でソフト削除（誤操作）の代替にはならない（誤削除も同期される）。手動スナップショットは自動化されておらず運用負荷が大きい。",cmp:[{svc:"Blob ソフト削除",feature:"論理削除・期間内復元",rto:"即時復元",cost:"保持データ分の料金",note:"✓ 推奨"},{svc:"Blobスナップショット",feature:"時点コピー",rto:"スナップショット時点に復元",cost:"差分のみ",note:"手動または自動化が必要"},{svc:"不変ストレージ（WORM）",feature:"書き換え・削除不可",rto:"保持期間中は変更不可",cost:"中",note:"法令遵守・完全保護向け"}],kws:["ソフト削除","Soft Delete","誤削除保護","復元","保持期間","Blob"]},
  {domain:"ストレージ",cat:"ストレージアカウント",diff:"Hard",q:"複数のストレージアカウントが存在する環境で、各アカウントのアクセスキーをアプリケーションがハードコードしている。セキュリティを向上させたい。最適な方法は？",opts:["アクセスキーをGit管理して全開発者と共有","アクセスキーをAzure Key Vaultに保存してアプリはKey Vaultから動的に取得。アプリのManaged IdentityでKey Vaultにアクセス","アクセスキーをApp Service構成（環境変数）に設定","SASトークンを生成してアプリに埋め込む"],ans:1,why:"最善の構成はアクセスキーをAzure Key VaultのSecretに保管し、アプリのManaged IdentityでKey VaultにアクセスしてキーをランタイムにSecure取得すること。Key Vaultではキーのローテーション・監査ログ・アクセス制御が一元管理できる。さらにStorage AccountのManaged Identityアクセス（RBACでStorage Blob Data Contributor等）に移行すればキー管理自体が不要になる。",trap:"Gitへのアクセスキーコミットは最悪のプラクティスで機密漏洩リスクが極めて高い。App Serviceの環境変数は平文で保存されるためKey Vaultほどセキュアでない。SASトークンの埋め込みは有効期限が切れた際の管理が煩雑。",cmp:[{svc:"Key Vault＋Managed Identity",feature:"シークレット一元管理・監査",rto:"即時",cost:"Key Vault料金",note:"✓ 推奨"},{svc:"Storage RBAC（Managed Identity）",feature:"キーレス認証",rto:"即時",cost:"無料",note:"✓ さらにセキュア"},{svc:"環境変数",feature:"シンプル",rto:"即時",cost:"無料",note:"平文・監査なし"}],kws:["アクセスキー","Key Vault","Managed Identity","ストレージアカウント","シークレット管理","RBAC"]},
  {domain:"ストレージ",cat:"Azure Storage",diff:"Medium",q:"Azure Storageアカウントで静的Webサイト（HTML・CSS・JS）をホスティングしたい。カスタムドメイン（www.contoso.com）でアクセスできるようにしたい。最もコスト効率の良い方法は？",opts:["Azure App ServiceにWebサイトをデプロイ","ストレージアカウントの静的Webサイト機能（Static Website）を有効化してAzure CDNでカスタムドメインとHTTPSを設定","Azure Virtual MachineにApacheをインストール","Azure Functions Static Web Appを使用"],ans:1,why:"Azure Blob StorageのStatic Website機能を有効化すると$webコンテナのHTMLファイルが自動的にWebサイトとして公開される。カスタムドメインはAzure CDNまたはAzure Static Web AppsでHTTPS付きで設定できる。サーバーレスで管理不要・コストは転送量のみで非常に低コスト。",trap:"App ServiceはWebサーバーとしての機能は十分だが静的サイトには過剰でコストが高い。VMはインフラ管理・パッチ・可用性の確保が必要。Azure Static Web AppsはCI/CDと統合したより高機能なサービスだが要件に応じてBlobのStatic Websiteで十分なことも多い。",cmp:[{svc:"Blob Static Website＋CDN",feature:"サーバーレス・低コスト・CDN",rto:"即時",cost:"転送量のみ",note:"✓ 推奨"},{svc:"Azure Static Web Apps",feature:"CI/CD統合・フルスタック",rto:"ビルド後",cost:"無料プランあり",note:"フレームワーク対応"},{svc:"App Service",feature:"サーバーサイド対応",rto:"即時",cost:"プラン料金",note:"静的のみなら過剰"}],kws:["Static Website","静的Webサイト","Blob Storage","CDN","カスタムドメイン","$web"]},
  {domain:"ストレージ",cat:"Azure Blob Storage",diff:"Hard",q:"複数のサービスがAzure Blob Storageに同時に書き込みを行う。特定のBlobが同時に更新されてデータが破損しないようにしたい。Blobの排他制御を実装したい。最適な機能は？",opts:["ストレージアカウントのファイアウォールで同時アクセスを制限","Blob Leaseを取得して書き込み前に排他ロックを確保","Blobのバージョニングを有効化して全更新を保持","ストレージアカウントを書き込みサービスごとに分割"],ans:1,why:"Blob Lease（リース）はBlobに対して排他的な書き込みロックを取得する機能。リースID（GUID）を持つクライアントのみがBlobの更新・削除ができる。リース期間は15〜60秒（または無限）で設定でき、処理完了後にリリースする。分散環境での楽観的・悲観的並行制御に活用できる。",trap:"ファイアウォールはIPアドレスベースのアクセス制御で排他制御の機能はない。バージョニングは全更新を保持して過去バージョンに戻せる機能で排他制御ではない。ストレージアカウント分割は同一Blobへの競合を防げない。",cmp:[{svc:"Blob Lease",feature:"排他ロック・競合防止",rto:"リース期間15〜60秒",cost:"無料",note:"✓ 推奨"},{svc:"Blobバージョニング",feature:"更新履歴保持",rto:"即時",cost:"バージョン分の料金",note:"排他制御ではない"},{svc:"ETag楽観的並行制御",feature:"更新前の状態確認",rto:"即時",cost:"無料",note:"競合を検知するが排他はしない"}],kws:["Blob Lease","リース","排他制御","並行制御","同時書き込み","競合防止"]},

  // ── コンピューティング 追加分 ──
  {domain:"コンピューティング",cat:"VM可用性",diff:"Medium",q:"2台のAzure VMで同一アプリを稼働させ、どちらか1台が障害になっても継続稼働できるようにしたい。Azure SLAで99.99%の可用性を保証してもらうために必要な構成は？",opts:["同じAvailability ZoneにVM2台を配置","2台のVMを異なるAvailability Zone（AZ）に配置してAvailability Zones構成にする","VMを同じリソースグループに置く","Azure Backupで毎日バックアップを取る"],ans:1,why:"Availability Zones（AZ）を使って2台以上のVMを異なるAZに配置すると、Azure SLAで99.99%の仮想マシン稼働時間が保証される。各AZは独立した電源・冷却・ネットワークを持ち、1つのAZが障害になっても他のAZのVMは継続稼働できる。",trap:"同一AZに複数VMを置いてもAZレベルの障害には対応できず、SLAも99.99%にならない（Availability Setの場合は99.95%）。リソースグループは論理グループで可用性とは無関係。Backupはデータ保護でリアルタイム継続稼働ではない。",cmp:[{svc:"Availability Zones",feature:"AZ間冗長・99.99% SLA",rto:"即時（他AZで稼働）",cost:"AZ間転送料",note:"✓ 推奨"},{svc:"Availability Set",feature:"障害ドメイン・更新ドメイン分散",rto:"即時",cost:"無料",note:"99.95% SLA・AZ障害には非対応"},{svc:"単一VM（Premium SSD）",feature:"単純構成",rto:"VM再起動まで停止",cost:"低",note:"99.9% SLA・冗長性なし"}],kws:["Availability Zones","AZ","SLA","99.99%","可用性","ゾーン冗長"]},
  {domain:"コンピューティング",cat:"VM可用性",diff:"Medium",q:"本番環境のAzure VMに対してOSパッチ適用やメンテナンスを行う際、複数のVMが同時に再起動されてサービスが停止しないようにしたい。同一データセンター内で冗長性を確保したい。最適な機能は？",opts:["全VMを同時にメンテナンスウィンドウに入れる","Availability Set（可用性セット）を使って障害ドメインと更新ドメインを分散させる","VMを毎回手動でシャットダウンしてメンテナンス","Azure Site Recoveryを構成する"],ans:1,why:"Availability Set内のVMは障害ドメイン（FD：物理ラックを分散）と更新ドメイン（UD：Azureメンテナンス時の再起動バッチ）に分散配置される。メンテナンス時は一度に1つの更新ドメインのみ再起動されるため、同時に全VMが落ちることがない。同一リージョン・同一データセンター内での冗長性確保に適している。",trap:"全VM同時メンテナンスはサービス停止を引き起こす。手動シャットダウンは管理負担が大きく計画外の停止に対応できない。Site RecoveryはDR向けで同一DC内のメンテナンス冗長性とは用途が異なる。",cmp:[{svc:"Availability Set",feature:"FD/UD分散・同時再起動防止",rto:"即時",cost:"無料",note:"✓ 推奨（同一DC内）"},{svc:"Availability Zones",feature:"AZ間物理分散",rto:"即時",cost:"AZ間転送料",note:"99.99% SLA・より高い冗長性"},{svc:"手動管理",feature:"完全制御",rto:"管理工数大",cost:"無料",note:"スケールしない"}],kws:["Availability Set","障害ドメイン","更新ドメイン","メンテナンス","同時再起動防止","99.95%"]},
  {domain:"コンピューティング",cat:"VM管理",diff:"Easy",q:"Azure VMのサイズ（vCPU数・メモリ）を変更したい。現在VM（Standard_D2s_v3）はLinuxで稼働中。サイズ変更の際に考慮すべき点はどれか？",opts:["サイズ変更はAzureサポートへ申請が必要でユーザーは変更できない","サイズ変更時は通常VMの再起動が必要。新しいサイズが同じホストクラスターで利用可能かどうかも確認が必要","サイズ変更はダウンタイムなしでリアルタイムに行える","Linuxの場合はOSの再インストールが必要"],ans:1,why:"Azure VMのサイズ変更は基本的にVMの再起動（停止→サイズ変更→起動）が必要。また新しいサイズが現在のホストクラスターで利用可能な場合は再起動のみで変更できるが、異なるVMファミリーへの変更など利用できない場合は割り当て解除（Deallocate）が必要になる。割り当て解除するとパブリックIPが変わる可能性がある（動的IPの場合）。",trap:"ユーザー自身がポータルやCLIからサイズ変更できる（サポート申請不要）。ダウンタイムなしのリアルタイム変更は通常できない（Live Migrationはホスト間移動で一部対応するが保証はない）。Linuxの再インストールは不要（OSディスクは保持される）。",cmp:[{svc:"同クラスター内サイズ変更",feature:"再起動のみ",rto:"数分",cost:"無料",note:"✓ 同ファミリー内で高速"},{svc:"割り当て解除後サイズ変更",feature:"任意サイズへ変更可能",rto:"数分（IPアドレス要確認）",cost:"無料",note:"異なるVMファミリーへ変更時"},{svc:"新VMへ移行",feature:"ダウンタイム最小化",rto:"設計次第",cost:"移行コスト",note:"Blue/Green構成で無停止移行"}],kws:["VMサイズ変更","Deallocate","再起動","ホストクラスター","Standard_D","vCPU"]},
  {domain:"コンピューティング",cat:"App Service",diff:"Medium",q:"Azure App ServiceのWebアプリで、リクエストの急増時に自動でスケールアウトしてほしい。1日の中でトラフィックのピーク時間帯が決まっている（平日9時〜18時）。最適なスケーリング設定は？",opts:["手動でインスタンス数を増やす","メトリクスベースの自動スケーリング（CPU使用率80%超でスケールアウト）のみ設定","スケジュールベースのスケーリング（平日9時〜18時に最小インスタンス数を増加）とメトリクスベースを組み合わせる","常に最大インスタンス数で稼働させる"],ans:2,why:"スケジュールベースとメトリクスベースの組み合わせが最も効率的。スケジュールで平日業務時間帯の最小インスタンス数を増やすことでピーク前に準備でき、その上でCPU等のメトリクスに応じた追加スケールアウトも対応できる。予測可能なパターンと突発的な負荷の両方に対応できる。",trap:"手動スケーリングはリアルタイムの対応が遅れる。メトリクスのみだとスケールアウトに数分かかりピーク直後の応答が遅延する（コールドスタート問題）。常時最大インスタンスはコストが最大になる。",cmp:[{svc:"スケジュール＋メトリクス",feature:"予測対応＋動的対応",rto:"スケジュール分は事前対応",cost:"効率的",note:"✓ 推奨"},{svc:"メトリクスのみ",feature:"動的対応",rto:"スケールアウトに数分",cost:"効率的",note:"ピーク初動が遅い"},{svc:"常時最大",feature:"即時対応",rto:"ゼロ",cost:"最大コスト",note:"オフピーク時のコスト無駄"}],kws:["App Service","自動スケーリング","スケジュール","メトリクス","スケールアウト","インスタンス数"]},
  {domain:"コンピューティング",cat:"VM管理",diff:"Hard",q:"Azure VMに対してOSレベルの設定（ソフトウェアインストール・設定ファイル変更）を100台のVMに一括で自動適用したい。構成の一貫性も継続的に保証したい。最適なサービスは？",opts:["各VMにSSH/RDPで手動ログインして設定","Azure VM Extensions（カスタムスクリプト拡張機能）で1回だけスクリプトを実行","Azure Automation State Configuration（DSC）またはAzure PolicyのGuestConfigurationでVMの構成を継続的に管理","Azureポータルから100台のVMを順次設定"],ans:2,why:"Azure Automation DSC（Desired State Configuration）はPowerShell DSCを使ってVMの望ましい構成状態を定義し、継続的に適用・監視する。構成ドリフト（意図しない変更）が検出されると自動的に修正される。Azure PolicyのGuestConfigurationも同様に構成の継続的なコンプライアンス確認ができる。",trap:"手動SSHは100台では非現実的でスケールしない。VMの拡張機能でのスクリプト実行は1回限りで継続的な構成管理・ドリフト検出ができない。ポータルからの手動設定は最も非効率。",cmp:[{svc:"Automation DSC",feature:"継続的構成管理・ドリフト修正",rto:"定期チェック",cost:"Automation料金",note:"✓ 推奨"},{svc:"VM Extensions（スクリプト）",feature:"1回限りの実行",rto:"即時",cost:"無料",note:"継続管理・ドリフト検出なし"},{svc:"Azure Policy（GuestConfig）",feature:"継続的コンプライアンス",rto:"定期チェック",cost:"有料",note:"✓ 監査・修復に有効"}],kws:["Azure Automation","DSC","Desired State Configuration","GuestConfiguration","構成管理","ドリフト検出"]},
  {domain:"コンピューティング",cat:"コンテナ",diff:"Medium",q:"短期間の単発バッチ処理をDockerコンテナで実行したい。処理が完了したらコンテナを終了させ、インフラの管理は最小化したい。起動が速く従量課金で使いたい。最適なサービスは？",opts:["Azure Kubernetes Service（AKS）にコンテナをデプロイ","Azure Container Instances（ACI）を使用","Azure Virtual MachineにDockerをインストール","Azure App Service Linuxでコンテナを実行"],ans:1,why:"Azure Container Instances（ACI）はKubernetesやVMのオーバーヘッドなしにDockerコンテナを秒単位で起動・実行できるサーバーレスコンテナサービス。バッチ処理などの単発・短期ワークロードに最適で、コンテナ停止後は課金も停止する（秒単位課金）。",trap:"AKSはオーケストレーションが必要な長期稼働マイクロサービス向けで単発バッチには過剰。VMへのDocker手動インストールはインフラ管理コストが高い。App Serviceは常時起動型のWebアプリ向けでバッチ処理の単発実行には適さない。",cmp:[{svc:"ACI",feature:"秒単位起動・サーバーレス・従量課金",rto:"数秒",cost:"秒単位",note:"✓ 推奨"},{svc:"AKS",feature:"オーケストレーション・スケーリング",rto:"クラスター起動後",cost:"ノードVM料金",note:"長期マイクロサービス向け"},{svc:"VM＋Docker",feature:"完全な制御",rto:"VM起動時間",cost:"常時VM料金",note:"管理負担大"}],kws:["Azure Container Instances","ACI","バッチ処理","サーバーレス","秒単位課金","Dockerコンテナ"]},
  {domain:"コンピューティング",cat:"Azure Functions",diff:"Medium",q:"Azure Functionsで長時間実行される処理（30分以上）を実装したい。通常のFunctionsは最大タイムアウトが10分（従量課金プランの場合）。どのように対応するか？",opts:["タイムアウト設定を無制限に変更する","Durable Functionsを使用してオーケストレーション・チェックポイント機能で長時間処理を実現","Azure Logic Appsに移行する","より高速なコードに書き直して10分以内に完了させる"],ans:1,why:"Durable Functionsは通常のAzure Functionsを拡張して、ステートフルなワークフロー・チェックポイント・オーケストレーションを実現する。ActivityFunctionを組み合わせることで実質的に時間制限なしの長時間処理が実装できる。チェックポイントにより中断・再開も可能。",trap:"従量課金プランのFunctionsタイムアウトは最大10分（デフォルト5分）で無制限にはできない（PremiumプランやApp Service Planでは延長可能だが無制限ではない）。Logic Appsはローコードで別サービスへの移行になる。10分以内への書き直しは処理の性質上不可能な場合がある。",cmp:[{svc:"Durable Functions",feature:"ステートフル・チェックポイント・無時間制限",rto:"中断・再開可能",cost:"実行時間課金",note:"✓ 推奨"},{svc:"Functions Premium Plan",feature:"タイムアウト延長（最大無制限）",rto:"常時ウォーム",cost:"Premium料金",note:"単純な時間延長なら有効"},{svc:"Logic Apps",feature:"ローコード・ビジュアル",rto:"ステップ実行",cost:"実行回数課金",note:"コード移行が必要"}],kws:["Durable Functions","長時間実行","タイムアウト","オーケストレーション","チェックポイント","ステートフル"]},
  {domain:"コンピューティング",cat:"App Service",diff:"Hard",q:"Azure App Service（Standard S2プラン）でホストしているWebアプリのレスポンスが遅い。Application Insightsのデータを確認したところCPU使用率は低いが、メモリ使用量が高い状態が続いている。最初に取るべきアクションは？",opts:["すぐに上位プラン（Premium P2）にスケールアップする","App Serviceの診断ツール（Diagnose and Solve Problems）とApplication Insightsのメモリプロファイラーでメモリリークを調査する","App Serviceを再起動して一時的に解消する","VMに移行してより多くのメモリを割り当てる"],ans:1,why:"メモリ使用量が高い場合は根本原因の調査が先決。App ServiceのDiagnose and Solve Problemsはメモリ使用のトレンド・クラッシュ・例外を自動分析する。Application Insightsのスナップショットデバッガー・メモリプロファイラーでメモリリークのコードを特定できる。原因不明のままスケールアップしてもコストが増えるだけで根本解決しない。",trap:"スケールアップは一時的な解決策に過ぎずメモリリークがあれば上位プランでも同じ問題が発生する。再起動は一時的にメモリを解放するがリークは継続する。VMへの移行は問題の根本解決にならない（コードのリークが原因の場合）。",cmp:[{svc:"診断ツール＋AppInsights",feature:"根本原因特定・コスト最小",rto:"調査期間",cost:"AppInsights料金",note:"✓ 推奨（まず調査）"},{svc:"スケールアップ",feature:"即時性能向上",rto:"数分",cost:"上位プラン料金",note:"リークが原因なら効果なし"},{svc:"再起動",feature:"即時解消（一時的）",rto:"数秒",cost:"無料",note:"根本解決にならない"}],kws:["App Service","メモリリーク","Diagnose","Application Insights","プロファイラー","トラブルシューティング"]},
  {domain:"コンピューティング",cat:"コンテナ",diff:"Hard",q:"AKSクラスターで稼働しているアプリの新バージョンをデプロイしたい。ユーザーへの影響を最小化しつつ、問題があれば即座にロールバックできるようにしたい。Kubernetes標準の手法は？",opts:["全Podを一度に削除して新バージョンをデプロイ（Recreate戦略）","Kubernetes DeploymentのRolling Update戦略を使い、maxUnavailableとmaxSurgeを設定して段階的に更新","新しいNodePoolを作成して全トラフィックを切り替え","ブルーグリーンデプロイメントとして手動でServiceのselectorを変更"],ans:1,why:"Kubernetes DeploymentのRolling Update（デフォルト戦略）はmaxUnavailable（同時停止可能Pod数）とmaxSurge（超過Pod数）を制御しながら段階的に旧Podを新Podに入れ替える。問題発生時はkubectl rollout undoで即座にロールバックできる。ゼロダウンタイムに近いデプロイが実現できる。",trap:"Recreate戦略は全Pod削除→新Pod作成でダウンタイムが発生する。新NodePool作成はインフラコストが大きく切り替え管理も複雑。手動のBlue/Greenも有効な手法だがKubernetes標準のRolling Updateより操作が複雑。",cmp:[{svc:"Rolling Update",feature:"段階的更新・即時ロールバック",rto:"ゼロダウンタイム",cost:"maxSurge分の一時コスト",note:"✓ 推奨（K8s標準）"},{svc:"Blue/Green",feature:"即時切り替え・完全ロールバック",rto:"ゼロダウンタイム",cost:"2倍のリソース",note:"完全な安全性が必要な場合"},{svc:"Recreate",feature:"シンプル",rto:"ダウンタイムあり",cost:"追加コストなし",note:"開発環境向け"}],kws:["AKS","Rolling Update","maxUnavailable","maxSurge","ロールバック","Kubernetes","ゼロダウンタイム"]},
  {domain:"コンピューティング",cat:"VM管理",diff:"Medium",q:"Azure VMに対してOSのセキュリティパッチを自動的に適用したい。パッチ適用はメンテナンスウィンドウ（毎週日曜2時〜4時）に限定したい。最適なサービスは？",opts:["VMに手動でWindows Updateまたはyumコマンドでパッチ適用","Azure Update Manager（旧Update Management）でパッチスケジュールと定期評価を設定","VM起動のたびにカスタムスクリプトで自動更新","Azure Automation Runbookで毎週スクリプトを実行"],ans:1,why:"Azure Update Manager（以前のUpdate Management）はAzure VMとArc対応サーバーのOSパッチを一元管理する。定期評価で新規パッチを検出し、スケジュールされたメンテナンスウィンドウ内でのみパッチを自動適用できる。パッチ適用状況のレポートや多数のVMへの一括適用も可能。",trap:"手動パッチ適用はスケールしない（VM数が増えると管理不能）。カスタムスクリプトの自動実行はパッチ管理の全機能（評価・レポート・ロールバック）を自前で実装する必要がある。Runbookはパッチ管理の一部を自動化できるがUpdate Managerほど統合されていない。",cmp:[{svc:"Azure Update Manager",feature:"スケジュール・評価・レポート一元管理",rto:"即時",cost:"無料（基本機能）",note:"✓ 推奨"},{svc:"Automation Runbook",feature:"柔軟なカスタム自動化",rto:"スクリプト作成後",cost:"Automation料金",note:"カスタム要件に対応"},{svc:"手動更新",feature:"完全な制御",rto:"管理工数大",cost:"無料",note:"スケールしない"}],kws:["Azure Update Manager","パッチ管理","メンテナンスウィンドウ","セキュリティパッチ","Update Management","自動更新"]},
  {domain:"コンピューティング",cat:"Azure Functions",diff:"Easy",q:"Azure FunctionsのホスティングプランとしてConsumption Plan（従量課金プラン）を使用している。このプランの特徴として正しいものはどれか？",opts:["常に最低1インスタンスが起動しておりコールドスタートがない","スケールは最大10インスタンスまでに制限される","使用した分だけ課金され、アイドル時のコストはゼロ。ただしコールドスタートが発生する場合がある","専用のCompute上で稼働するため最高パフォーマンス"],ans:2,why:"Consumption Plan（従量課金）はAzure Functionsの基本プランで、関数実行回数と実行時間のみ課金される。アイドル時間は課金ゼロで、月100万回実行・40万GB-sの無料枠もある。ただし一定時間アイドル状態が続くとインスタンスがスケールダウンし、次の実行時にコールドスタート（起動遅延）が発生する場合がある。",trap:"常に1インスタンス起動はPremium PlanのAlways On機能。最大10インスタンスはConsumptionプランの上限だが正確には200インスタンスまでスケールアウト可能。専用Computeで最高パフォーマンスはDedicated（App Service）プランの説明。",cmp:[{svc:"Consumption Plan",feature:"従量課金・自動スケール・無料枠",rto:"コールドスタートあり",cost:"実行回数・時間のみ",note:"✓ 開発・低頻度向け"},{svc:"Premium Plan",feature:"常時ウォーム・VNet統合・高スペック",rto:"コールドスタートなし",cost:"常時課金",note:"本番・VNet接続向け"},{svc:"Dedicated Plan",feature:"App Service共用・常時稼働",rto:"コールドスタートなし",cost:"App Serviceプラン料金",note:"既存ASPがある場合"}],kws:["Consumption Plan","従量課金","コールドスタート","自動スケール","無料枠","Azure Functions"]},
  {domain:"コンピューティング",cat:"コンテナ",diff:"Medium",q:"Azure Container Registry（ACR）を使用してDockerイメージを管理している。CI/CDパイプラインからACRにイメージをプッシュする際、最もセキュアな認証方法は？",opts:["ACRのAdmin AccountのユーザーID/パスワードを使用","サービスプリンシパルにACR Pushロールを付与してClient ID/Secretで認証","Azure DevOpsまたはGitHub ActionsのManaged IdentityまたはサービスプリンシパルでWorkload Identity Federationを使用","ACRのアクセスキーをCI/CDの環境変数にハードコード"],ans:2,why:"Workload Identity Federation（WIF）はCI/CDサービス（GitHub Actions・Azure DevOps等）のIDトークンをAzure ADで信頼することで、シークレットを使わずにACRへの認証が可能。シークレットのローテーション不要・漏洩リスクゼロでセキュリティが最も高い構成。GitHub ActionsならAzure Login Actionで設定できる。",trap:"Admin Accountは管理用の固定認証情報でCI/CDには向かない（ローテーションが困難）。サービスプリンシパルのClient Secret管理は定期ローテーションが必要。ハードコードは最悪のプラクティスで機密漏洩リスクが高い。",cmp:[{svc:"Workload Identity Federation",feature:"シークレットレス・ローテーション不要",rto:"即時",cost:"無料",note:"✓ 推奨（最もセキュア）"},{svc:"サービスプリンシパル＋Secret",feature:"汎用的な認証",rto:"即時",cost:"無料",note:"Secret管理・ローテーション必要"},{svc:"Managed Identity",feature:"Azureリソースからのアクセス",rto:"即時",cost:"無料",note:"Azure内からのアクセス向け"}],kws:["ACR","Azure Container Registry","Workload Identity Federation","CI/CD","サービスプリンシパル","シークレットレス"]},
  {domain:"コンピューティング",cat:"VM管理",diff:"Hard",q:"Azure VMで実行しているアプリが特定の時間帯にCPUスパイク（使用率100%）を引き起こしている。原因調査のためにVMのCPU使用率・メモリ・ディスクI/Oのメトリクスを詳細に収集してAzure Monitorで分析したい。必要な設定は？",opts:["Azure Portalで個別にVMメトリクスを確認する","Azure Monitor AgentをVMにインストールしてData Collection Rule（DCR）でメトリクスとログをLog Analyticsワークスペースに収集","VMのシリアルコンソールでtopコマンドを実行","Azure Advisor の推奨事項を確認する"],ans:1,why:"Azure Monitor Agent（AMA）は旧来のMMA/OMS エージェントの後継で、Data Collection Rule（DCR）で収集するメトリクス・ログ・イベントを細かく定義できる。VMのCPU・メモリ・ディスクI/OのパフォーマンスカウンターをLog Analyticsに収集してKQLで分析できる。複数VMへの一括適用も可能。",trap:"ポータルでの個別確認は俯瞰的な分析ができずKQLクエリも書けない。シリアルコンソールでのtopコマンドはリアルタイム確認のみで過去データの分析はできない。Azure Advisorはコスト・パフォーマンス推奨で詳細メトリクス収集は行わない。",cmp:[{svc:"Azure Monitor Agent＋DCR",feature:"柔軟な収集・KQL分析・複数VM対応",rto:"エージェント設定後",cost:"Log Analytics料金",note:"✓ 推奨"},{svc:"ポータルのメトリクス",feature:"基本メトリクス・即時確認",rto:"即時",cost:"無料",note:"詳細分析・ログ収集は不可"},{svc:"Diagnostics Extension",feature:"ストレージへのメトリクス書き出し",rto:"設定後",cost:"ストレージ料金",note:"旧来の方式・AMAに移行推奨"}],kws:["Azure Monitor Agent","AMA","Data Collection Rule","DCR","Log Analytics","パフォーマンスカウンター","KQL"]},
  {domain:"コンピューティング",cat:"App Service",diff:"Medium",q:"Azure App Service上のWebアプリで、接続しているAzure SQL DatabaseへのSQL接続文字列を安全に管理したい。アプリのコードやGitリポジトリに接続文字列を含めたくない。最適な方法は？",opts:["appsettings.jsonに接続文字列をハードコードしてGitで管理","App ServiceのConfiguration（アプリケーション設定）に接続文字列を設定","Azure Key Vaultにシークレットとして保存し、App ServiceのManaged Identityからアクセス","接続文字列をBase64エンコードしてコードに埋め込む"],ans:2,why:"Azure Key VaultにSQL接続文字列をシークレットとして保存し、App ServiceのSystem-Assigned Managed IdentityにKey VaultのSecrets Userロールを付与することで、コードや設定ファイルに機密情報を持たずに接続文字列を取得できる。Key VaultのシークレットをApp Serviceの参照構文（@Microsoft.KeyVault）で直接参照することもできる。",trap:"appsettings.jsonへのハードコードはGitに機密情報が残り最悪のプラクティス。App ServiceのConfiguration設定はポータルで平文表示されるためKey Vaultほどセキュアでない（ただしGitよりは安全）。Base64エンコードは暗号化ではなく簡単にデコードできる。",cmp:[{svc:"Key Vault＋Managed Identity",feature:"最高セキュリティ・監査・ローテーション",rto:"即時",cost:"Key Vault料金",note:"✓ 推奨"},{svc:"App Service Configuration",feature:"シンプル・暗号化保存",rto:"即時",cost:"無料",note:"Key Vaultより簡便だがやや劣る"},{svc:"コードへのハードコード",feature:"—",rto:"—",cost:"無料",note:"絶対NG"}],kws:["App Service","Key Vault","Managed Identity","接続文字列","シークレット","Configuration"]},
  {domain:"コンピューティング",cat:"スケーリング",diff:"Hard",q:"VM Scale Set（VMSS）で稼働するアプリが、ユーザー数急増によりスケールアウトが間に合わずレスポンスが遅延することがある。スケールアウトをより速く・予測的に行いたい。最適な設定は？",opts:["スケールアウトのCPU閾値を50%に下げる","予測的自動スケーリング（Predictive Autoscale）を有効化してMLが過去パターンから事前にスケールアウト","最大インスタンス数を増やす","スケールアウトのクールダウン期間を0秒にする"],ans:1,why:"予測的自動スケーリング（Predictive Autoscale）はAzure Monitorの機械学習が過去7日間のCPU使用率パターンを学習し、ピーク前に自動的にスケールアウトを実行する。反応的なスケール（閾値超過後にスケール）と組み合わせることでコールドスタート遅延を防止できる。",trap:"CPU閾値を下げると非ピーク時も過剰にスケールアウトしてコストが増加する。最大インスタンス数の増加はスケールアウト速度を改善しない。クールダウン0秒は振動（スケールアウト・インの繰り返し）が発生しリソース効率が下がる。",cmp:[{svc:"予測的自動スケーリング",feature:"ML予測・事前スケールアウト",rto:"ピーク前にスケール完了",cost:"無料",note:"✓ 推奨"},{svc:"反応的スケーリング（メトリクス）",feature:"閾値超過後にスケール",rto:"スケールアウトに数分",cost:"無料",note:"初動遅延あり"},{svc:"スケジュールスケーリング",feature:"時間帯ベース",rto:"事前定義",cost:"無料",note:"パターン不規則な場合は効果なし"}],kws:["VMSS","予測的自動スケーリング","Predictive Autoscale","機械学習","スケールアウト","コールドスタート"]},

  {domain:"監視",cat:"Azure Monitor",diff:"Easy",q:"Azure Monitorにおける「メトリクス」と「ログ」の違いとして正しい説明はどれか？",opts:["メトリクスはテキスト形式のイベント記録、ログは数値の時系列データ","メトリクスは数値の時系列データ（CPU使用率・レイテンシー等）でリアルタイム監視に向く。ログは構造化・非構造化のイベント記録でKQLによる詳細分析に向く","メトリクスはLog Analyticsに保存され、ログはメトリクスエクスプローラーで確認できる","メトリクスとログは同じもので保存先が異なるだけ"],ans:1,why:"Azure Monitorはメトリクスとログの2種類のデータを扱う。メトリクスは数値の時系列データ（例：CPU使用率・リクエスト数）で軽量・高頻度でリアルタイムアラートに適している。ログは構造化・非構造化のイベントデータ（例：アクティビティログ・診断ログ）でLog AnalyticsにKQLクエリで深い分析ができる。",trap:"メトリクスはメトリクスデータベースに保存され（93日間保持）、ログはLog Analyticsワークスペースに保存される。保存先と用途が異なる。どちらもAzure Monitorの一部だが別々のデータストアを持つ。",cmp:[{svc:"メトリクス",feature:"数値・時系列・リアルタイム",rto:"ほぼリアルタイム",cost:"無料（93日）",note:"アラート・ダッシュボード向け"},{svc:"ログ",feature:"イベント・KQL分析・長期保持",rto:"数分の遅延",cost:"取り込み量課金",note:"詳細調査・セキュリティ向け"},{svc:"トレース",feature:"分散トレーシング",rto:"リアルタイム",cost:"AppInsightsデータ量",note:"AppInsightsで収集"}],kws:["Azure Monitor","メトリクス","ログ","KQL","Log Analytics","メトリクスエクスプローラー","時系列"]},
  {domain:"監視",cat:"Azure Monitor",diff:"Medium",q:"本番環境でAzure VM・App Service・SQL Databaseなど複数リソースのアラートを一元管理したい。アラート発生時にメール送信・Webhook呼び出し・Teamsへの通知を同時に行いたい。最適な構成は？",opts:["各リソースに個別にメールアラートを設定","Azure Monitor アラートルールにAction Groupを紐付けて通知先（メール・Webhook・Teams）をまとめて管理","Azure Service Healthのアラートのみを使用","各チームメンバーに個別のアラートを設定"],ans:1,why:"Action Group（アクショングループ）は1つ以上の通知アクション（メール・SMS・プッシュ通知・Webhook・Azure Function・Logic Apps・ITSMなど）をグループ化したリソース。複数のアラートルールに同じAction Groupを紐付けることで、通知先の一元管理・変更が容易になる。Teamsへの通知はWebhookまたはLogic Appsで実現できる。",trap:"個別設定は管理が分散して変更時の工数が大きい。Service HealthはAzureサービス自体の障害通知でVMなど自分のリソースのカスタムアラートは設定できない。個人ごとのアラート設定は組織での一元管理ができない。",cmp:[{svc:"Action Group",feature:"通知先一元管理・複数チャンネル",rto:"アラート発火後即時",cost:"無料（SMS・音声通話は有料）",note:"✓ 推奨"},{svc:"個別メール設定",feature:"シンプル",rto:"即時",cost:"無料",note:"管理分散・変更コスト大"},{svc:"Logic Apps連携",feature:"高度なワークフロー",rto:"ステップ実行",cost:"実行回数課金",note:"複雑な通知ロジックに有効"}],kws:["Action Group","アラートルール","メール通知","Webhook","Teams","Azure Monitor","通知管理"]},
  {domain:"監視",cat:"Log Analytics",diff:"Hard",q:"Log Analyticsワークスペースに収集されたVMのSyslogを分析している。過去1時間以内にERRORレベルのログが10件以上出力されたVMのホスト名を一覧で取得したい。KQLクエリとして正しいのはどれか？",opts:["SELECT HostName FROM Syslog WHERE SeverityLevel='error' AND TimeGenerated > ago(1h) GROUP BY HostName HAVING COUNT(*) >= 10","Syslog | where SeverityLevel == 'err' and TimeGenerated > ago(1h) | summarize ErrorCount=count() by Computer | where ErrorCount >= 10","Syslog | filter SeverityLevel = 'ERROR' | take 10","GET /logs?severity=error&hours=1&min_count=10"],ans:1,why:"KQL（Kusto Query Language）の基本構文はパイプ（|）でオペレーターを繋ぐ。where句でフィルタリング、summarizeで集計、再度whereで集計結果をフィルタリングする。SyslogのSeverityLevelは'err'でComputerフィールドにホスト名が入る。",trap:"SQL構文（SELECT・WHERE・GROUP BY）はKQLでは使えない。KQLのフィルターはfilterではなくwhere。SeverityLevelの値は'error'ではなく'err'。REST API形式はLog Analyticsのクエリ言語ではない。",cmp:[{svc:"KQL（正しい構文）",feature:"パイプライン・集計・フィルター",rto:"即時",cost:"無料",note:"✓ 正しいKQL"},{svc:"SQL構文",feature:"リレーショナルDB向け",rto:"—",cost:"—",note:"KQLでは使用不可"},{svc:"REST API",feature:"プログラマティックアクセス",rto:"HTTP応答",cost:"無料",note:"クエリ言語ではない"}],kws:["KQL","Kusto Query Language","Log Analytics","Syslog","where","summarize","パイプライン"]},
  {domain:"監視",cat:"Azure Monitor",diff:"Medium",q:"Azure Monitorのアラートが頻繁に発火して「アラート疲れ」が起きている。CPU 80%超のアラートが5分ごとに発生するが、実際には一時的なスパイクが多く本当の問題ではない。改善策として最適なのはどれか？",opts:["アラートを全て無効にする","アラートルールの評価ウィンドウを延長（例：5分→15分）して閾値をウィンドウ内の平均値で評価するように変更","アラートの受信者を減らす","メール通知をSMSに変更する"],ans:1,why:"アラートの評価ウィンドウ（集計期間）と閾値の組み合わせを調整することで誤検知を減らせる。5分間の最大値ではなく15分間の平均値が80%超の場合に発火するように変更すると、一時的なスパイクをフィルタリングできる。さらにアラートルールの「アラートの状態」を活用して同一アラートの重複通知を抑制することも有効。",trap:"全アラート無効は本当の問題を見逃すリスクがある。受信者を減らしても誤検知の量は変わらない。通知手段の変更（メール→SMS）は頻度の改善にならない。",cmp:[{svc:"評価ウィンドウ延長＋平均値閾値",feature:"誤検知削減・本質的問題検出",rto:"変更後即時",cost:"無料",note:"✓ 推奨"},{svc:"アラート抑制（ミュート）",feature:"一定期間通知停止",rto:"即時",cost:"無料",note:"計画メンテ時に有効"},{svc:"動的閾値",feature:"ML学習による自動閾値",rto:"学習後",cost:"無料",note:"✓ 季節性があるパターンに有効"}],kws:["アラート","評価ウィンドウ","閾値","誤検知","アラート疲れ","集計期間","動的閾値"]},
  {domain:"監視",cat:"Application Insights",diff:"Hard",q:"Azure App Serviceで稼働するWebアプリのある特定エンドポイント（/api/checkout）のエラー率が急増している。エラーの原因となっている依存サービス（外部決済API・SQL DB）を特定し、どのコードパスで失敗しているかを調査したい。最適なApplication Insightsの機能は？",opts:["Application Insightsのライブメトリクスでリアルタイムのエラー数を確認","Application InsightsのトランザクションSearch（End-to-Endトランザクション）と依存関係マップ（Application Map）を使用してエラーの根本原因を特定","Azure MonitorのメトリクスでHTTPエラー率を確認","Log AnalyticsでHTTPアクセスログを手動で検索"],ans:1,why:"Application InsightsのEnd-to-Endトランザクションは個々のリクエストのトレースを完全に追跡し、どの依存関係呼び出し（SQL・外部API等）で失敗したかをウォーターフォールビューで確認できる。Application Map（アプリケーションマップ）は依存サービス間のトポロジーとエラー率・レイテンシーを視覚化する。",trap:"ライブメトリクスはリアルタイムのエラー数確認には有効だが根本原因の特定はできない。Azure MonitorのメトリクスはHTTPエラー率の数値確認でコードパスや依存関係の詳細は分からない。ログの手動検索は可能だが相関分析・依存関係のウォーターフォールビューがなく効率が悪い。",cmp:[{svc:"End-to-Endトランザクション",feature:"個別リクエストの完全トレース",rto:"即時",cost:"AppInsights料金",note:"✓ 根本原因特定に最適"},{svc:"Application Map",feature:"依存関係トポロジー・エラー率可視化",rto:"即時",cost:"AppInsights料金",note:"✓ サービス間の問題を俯瞰"},{svc:"ライブメトリクス",feature:"リアルタイム数値監視",rto:"ほぼ即時",cost:"AppInsights料金",note:"傾向確認向け・詳細調査には不十分"}],kws:["Application Insights","End-to-End","トランザクション","Application Map","依存関係","根本原因","トレース"]},
  {domain:"監視",cat:"Azure Monitor",diff:"Medium",q:"Azure Monitorで複数のサブスクリプション・リソースグループにまたがるリソースのメトリクスとアラートを一元的に可視化したい。経営層向けにリアルタイムのダッシュボードを共有したい。最適なサービスは？",opts:["各リソースのAzureポータル画面のスクリーンショットを共有","Azure Workbooks（ブック）でインタラクティブなレポートを作成してURLで共有，またはAzure Dashboardにピン留めして読み取り専用URLを発行","メールでメトリクスのCSVを定期送信","Power BIにAzure Monitorのデータをエクスポートして全社共有"],ans:1,why:"Azure DashboardはAzureポータルのピン留め機能でメトリクスグラフ・ログクエリ結果・リソース状態を一画面にまとめ、共有リンクで読み取り専用のビューを外部共有できる。Azure Workbooksはより高度なインタラクティブレポートで条件分岐・パラメーター・テーブルを組み合わせた詳細分析ができる。",trap:"スクリーンショット共有はリアルタイム性がなく更新が手動。CSVのメール送信はリアルタイムではなく手動作業が発生。Power BIは高度な分析が可能だがセットアップが複雑でAzureモニタリング専用には過剰な場合がある。",cmp:[{svc:"Azure Dashboard",feature:"リアルタイム・共有リンク・ピン留め",rto:"即時",cost:"無料",note:"✓ シンプルな共有向け"},{svc:"Azure Workbooks",feature:"インタラクティブ・パラメーター・詳細分析",rto:"即時",cost:"無料",note:"✓ 詳細レポート向け"},{svc:"Power BI",feature:"高度なBIレポート・全社共有",rto:"データ更新頻度依存",cost:"Power BI料金",note:"大規模BIには有効"}],kws:["Azure Dashboard","Azure Workbooks","ダッシュボード","共有","ピン留め","メトリクス可視化","リアルタイム"]},
  {domain:"監視",cat:"Azure Monitor",diff:"Hard",q:"複数のAzureリソース（VM・App Service・SQL DB・AKS）のログとセキュリティイベントを一元収集して高度な脅威検知・インシデント管理を行いたい。SOCチームがリアルタイムに調査できる環境を構築したい。最適なサービスは？",opts:["Log Analyticsワークスペースだけで十分","Microsoft Sentinelを導入してLog Analyticsを基盤にSIEM/SOARとして活用","Azure Security Centerのみを使用","各リソースのログをAzure Storageに保存して手動調査"],ans:1,why:"Microsoft Sentinel（旧Azure Sentinel）はLog Analyticsを基盤にしたクラウドネイティブのSIEM（セキュリティ情報イベント管理）＋SOAR（セキュリティオーケストレーション・自動応答）。AzureリソースだけでなくMicrosoft 365・AWS・オンプレミスなどのログを統合収集し、ML分析による脅威検知・インシデント管理・自動応答ワークブックを提供する。",trap:"Log Analyticsだけではデータ収集・KQL分析はできるが脅威インテリジェンス・インシデント管理・SOAR自動化が不足する。Security Center（現Microsoft Defender for Cloud）はクラウドリソースのセキュリティ態勢評価向けでSIEMではない。手動のStorage調査はリアルタイム対応ができない。",cmp:[{svc:"Microsoft Sentinel",feature:"SIEM/SOAR・ML脅威検知・インシデント管理",rto:"リアルタイム",cost:"データ取り込み量",note:"✓ 推奨"},{svc:"Log Analytics",feature:"ログ収集・KQL分析",rto:"数分の遅延",cost:"取り込み量",note:"Sentinelの基盤（単体では不十分）"},{svc:"Defender for Cloud",feature:"セキュリティ態勢評価・推奨事項",rto:"定期評価",cost:"リソース数",note:"SIEM/SOARではない"}],kws:["Microsoft Sentinel","SIEM","SOAR","脅威検知","インシデント管理","Log Analytics","SOC"]},
  {domain:"監視",cat:"Azure Monitor",diff:"Medium",q:"Azure App Serviceのレスポンスタイムが平均2秒を超えた場合に自動的にスケールアウトをトリガーしたい（現在のスケールアウトはCPUベース）。Application Insightsのカスタムメトリクスをスケーリングの条件にする方法は？",opts:["Application Insightsのデータは自動スケーリングに使用できない","Application InsightsのカスタムメトリクスをAzure Monitorに発行し、App Serviceの自動スケールルールでそのメトリクスを条件に設定","Azure Functionsでポーリングして手動スケール","Application InsightsのアラートからLogic Appsを経由してスケールアウトAPIを呼び出す"],ans:1,why:"Application Insightsのメトリクス（レスポンスタイム・カスタムメトリクス）はAzure Monitorに自動的に発行される。App Serviceの自動スケール設定でAzure Monitorのメトリクスソースとして「Application Insights」を選択し、requests/durationなどのメトリクスを閾値条件に設定できる。",trap:"Application InsightsのメトリクスはAzure Monitorに統合されているため自動スケーリングに使用できる（使用不可は誤り）。Logic Apps経由は可能だが不必要に複雑。Functions手動スケールはリアルタイム対応が遅い。",cmp:[{svc:"AppInsightsメトリクス＋自動スケール",feature:"レスポンスタイムベースのスケーリング",rto:"メトリクス評価後数分",cost:"無料",note:"✓ 推奨"},{svc:"CPUベーススケール",feature:"インフラメトリクスベース",rto:"評価後数分",cost:"無料",note:"アプリ体験と必ずしも相関しない"},{svc:"Logic Apps連携",feature:"柔軟なワークフロー",rto:"ポーリング遅延",cost:"実行回数課金",note:"シンプルな要件には過剰"}],kws:["Application Insights","カスタムメトリクス","自動スケール","レスポンスタイム","Azure Monitor","App Service","スケーリング条件"]},

  {domain:"バックアップ",cat:"Azure Backup",diff:"Medium",q:"Azure VMのバックアップをAzure Backupで構成している。誤ってVMのOSディスクを破損させてしまった。バックアップから特定のファイルだけを復元（個別ファイルリストア）したい。最適な方法は？",opts:["VMをまるごと別のVMとして復元してからファイルをコピー","Azure BackupのFile Recovery（ファイル回復）機能でリカバリーポイントをローカルディスクとしてマウントして必要なファイルだけ取得","Recovery Services Vaultを削除して再作成","バックアップからの個別ファイル復元はAzure Backupでは不可能"],ans:1,why:"Azure BackupのFile Recovery（ファイル回復）機能はリカバリーポイントをスクリプト経由でローカルにiSCSIディスクとしてマウントし、Windowsエクスプローラーまたはlinuxのファイルシステムとして必要なファイルだけをコピーできる。VMをフル復元する必要がなく時間とコストを節約できる。",trap:"VMまるごとの復元は時間がかかり不要なファイルも含む。Recovery Services Vaultの削除はバックアップデータの喪失につながる。個別ファイル復元はAzure Backupの標準機能として提供されている（不可能は誤り）。",cmp:[{svc:"File Recovery",feature:"個別ファイル取得セiSCSIマウント",rto:"数分でマウント完了",cost:"無料",note:"✓ 推奨"},{svc:"VMフル復元",feature:"別VMとして完全復元",rto:"数十分",cost:"ディスク料金",note:"ディスク全体が必要な場合"},{svc:"ディスク復元",feature:"管理ディスクとして復元",rto:"数十分",cost:"ディスク料金",note:"ディスクのアタッチ後に操作"}],kws:["File Recovery","ファイル回復","Azure Backup","iSCSI","個別ファイル","リカバリーポイント"]},
  {domain:"バックアップ",cat:"Azure Backup",diff:"Hard",q:"Azure Backupで保護しているVMのバックアップデータを誤って削除してしまった。削除後もデータを一定期間保護する仕組みを事前に有効にしていた。このデータを復旧できるか？",opts:["バックアップデータを削除したら復旧は不可能","論理的な削除（Soft Delete）が有効であれば、削除後14日間は「削除済み」状態でデータが保持され復旧できる","Recovery Services Vaultを再作成すればデータが戻る","Azureサポートに連絡すれば必ず復旧できる"],ans:1,why:"Azure BackupのSoft Delete（論理的な削除）機能はバックアップデータが削除された場合に14日間「論理削除済み」状態でデータを保持する。この期間内であれば「削除の取り消し（Undelete）」操作でバックアップデータを完全復旧できる。Recovery Services VaultではデフォルトでSoft Deleteが有効になっている。",trap:"Soft Deleteが有効な場合、削除後14日間は復旧可能。Vaultの再作成ではデータは戻らない。Azureサポートが必ずしも復旧できるわけではなくSoft Deleteの仕組みが正式な保護手段。Soft Deleteが無効の場合は削除後に復旧できない。",cmp:[{svc:"Soft Delete",feature:"14日間の保護・取り消し可能",rto:"即時復旧",cost:"14日間はデータ料金",note:"✓ 推奨（デフォルト有効）"},{svc:"Soft Delete無効",feature:"即時完全削除",rto:"復旧不可",cost:"ゼロ",note:"意図的な即時削除が必要な場合のみ"},{svc:"不変バックアップ",feature:"削除・変更不可のロック",rto:"保持期間中は変更不可",cost:"中",note:"コンプライアンス向け"}],kws:["Soft Delete","論理削除","Azure Backup","バックアップ削除","復旧","14日間","Undelete"]},
  {domain:"バックアップ",cat:"Azure Backup",diff:"Medium",q:"Azure SQL DatabaseのバックアップとPoint-in-Time Restore（PITR）について正しい説明はどれか？",opts:["Azure SQL Databaseのバックアップはユーザーが手動で設定する必要がある","Azure SQL Databaseは自動的にフルバックアップ（週次）・差分バックアップ（日次）・トランザクションログバックアップ（5～12分ごと）を取得し、PITRで保持期間内の任意の時点に復元できる","PITRの保持期間は最大10日間に固定されている","バックアップはAzure SQL Databaseの追加オプションで有料機能"],ans:1,why:"Azure SQL Databaseはマネージドサービスとして自動的にバックアップを管理する。フルバックアップ（週1回）・差分バックアップ（12～24時間ごと）・トランザクションログ（5～12分ごと）を自動取得し、PITRで保持期間（Basic: 7日、General Purpose/Business Critical: 1～35日で設定可能）内の任意の秒単位の時点に復元できる。",trap:"バックアップは自動（手動設定不要）。保持期間はサービスティアによって１～35日で設定可能（10日固定ではない）。バックアップはSQL Databaseの標準機能で追加費用なし（Long-Term Retentionは別途）。",cmp:[{svc:"自動バックアップ＋PITR",feature:"任意時点復元・自動管理",rto:"新規DBとして復元（数分～数十分）",cost:"バックアップストレージ料金",note:"✓ 標準機能"},{svc:"Long-Term Retention（LTR）",feature:"週次/月次/年次の長期保管",rto:"数十分",cost:"Blob Storage料金",note:"7～35日以上の保持が必要な場合"},{svc:"データベースコピー",feature:"手動のスナップコピー",rto:"即時（コピー先DB）",cost:"追加DB料金",note:"特定時点のスナップコピー"}],kws:["Azure SQL Database","PITR","Point-in-Time Restore","自動バックアップ","トランザクションログ","Long-Term Retention"]},
  {domain:"バックアップ",cat:"Azure Site Recovery",diff:"Hard",q:"オンプレミスのVMware仮想マシンをAzureにDRしたい。平常時はオンプレで稼屐し、災害時にAzureへフェイルオーバーしてサービスを継続、その後オンプレに戻せる構成が必要。最適なサービスと構成は？",opts:["毎日Azureにバックアップを取りDR時に手動で起動","Azure Site Recovery（ASR）でVMwareのVMをAzureにレプリケーションしてフェイルオーバー・フェイルバック","Azure Migrateでオンプレ環境を常時Azureに移行","AzureとオンプレをVPNで接続するだけ"],ans:1,why:"Azure Site Recovery（ASR）はオンプレミスのVMware・Hyper-V・物理サーバーをAzureにリアルタイムでレプリケーションするDRソリューション。フェイルオーバー（オンプレ→Azure）もフェイルバック（Azure→オンプレ復帰）もAzureポータルから実行できる。Recovery Planでフェイルオーバーの順序や自動化スクリプトも設定可能。",trap:"毎日バックアップのみではRPO（復旧ポイント目標）が最大01日となりデータロスが大きく、手動起動でRTOも長い。Azure MigrateはDRではなく完全移行ツール。VPN接続はネットワーク接続でDRとは別。",cmp:[{svc:"Azure Site Recovery",feature:"継続レプリケーション・FO・FB・Recovery Plan",rto:"RTO分単位・RPO秒～分単位",cost:"ASR料金+Azure VM料金（FO時）",note:"✓ 推奨"},{svc:"Azure Backup",feature:"定期バックアップ",rto:"RTO数時間",cost:"バックアップ料金",note:"長期保管向け・DRには不十分"},{svc:"Azure Migrate",feature:"恒久移行",rto:"移行後は常時Azure",cost:"移行コスト",note:"DRではなく完全移行"}],kws:["Azure Site Recovery","ASR","VMware","フェイルオーバー","フェイルバック","Recovery Plan","オンプレミスDR"]},
  {domain:"バックアップ",cat:"Azure Backup",diff:"Medium",q:"組織のコンプライアンス要件で、Azure VMのバックアップデータを7年間保持する必要がある。最適な構成は？",opts:["毎日のバックアップを9999日間保持するだけ","Azure Backupのバックアップポリシーで月次リカバリーポイント〒12ヶ月、年次リカバリーポイントを7年として階層的に保持ポリシーを設定","7年ごとに手動でバックアップを取り直す","Azure Storageに手動でVMディスクのスナップショットをエクスポートしで7年保管"],ans:1,why:"Azure Backupのバックアップポリシーは日次・週次・月次・年次のリカバリーポイントをそれぞれ異なる保持期間で設定できる（Enhanced Policy）。日次ポイントは短期間（例：30日）、月次ポイントは中期（12ヶ月）、年次ポイントは長期（7年）と階層化することでストレージコストを最適化しつつコンプライアンス要件を満たせる。",trap:"毎日9999日間保持はコストが非常に高い（全日次ポイントを長期保持する必要はない）。手動でのバックアップ再取得は管理負担が大きく自動化されていない。手動のディスクスナップショットはAzure Backupのポリシー管理・監視機能が使えない。",cmp:[{svc:"階層的保持ポリシー",feature:"日次/月次/年次の保持期間を個別設定",rto:"いずれかのポイントから復元",cost:"保持データ量に比例（最適化可能）",note:"✓ 推奨"},{svc:"全日次を長期保持",feature:"シンプル",rto:"任意の日に復元",cost:"最大コスト",note:"コスト非効率"},{svc:"Long-Term Retentionと組み合わせ",feature:"Azure Backup Vaultの長期保存",rto:"数時間",cost:"中",note:"SQL Database向けの機能"}],kws:["バックアップポリシー","月次","年次","長期保持","コンプライアンス","Enhanced Policy","階層的保持"]},
];

const DOMAINS_ARR=["全て","ID管理","ストレージ","コンピューティング","ネットワーク","監視","バックアップ"];
let cur=0,answered=false,total=0,ok=0,ng=0,streak=0,activeDomain="全て",pool=[],domainStats={};
DOMAINS_ARR.slice(1).forEach(d=>{domainStats[d]={ok:0,total:0}});

function countDomain(d){return d==="全て"?QS.length:QS.filter(q=>q.domain===d).length}
function buildPool(){pool=QS.filter(q=>activeDomain==="全て"||q.domain===activeDomain).sort(()=>Math.random()-.5);cur=0}

function initCats(){
  const r=document.getElementById('catRow');
  DOMAINS_ARR.forEach(d=>{
    const cnt=countDomain(d);
    const b=document.createElement('button');
    b.className='cat'+(d==="全て"?' on':'');
    b.disabled=cnt===0;
    b.innerHTML=d+(d!=="全て"?`<span class="cat-cnt">${cnt}</span>`:'');
    b.onclick=()=>{
      document.querySelectorAll('.cat').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');activeDomain=d;buildPool();renderQ();
    };
    r.appendChild(b);
  });
}

function renderQ(){
  document.getElementById('result').classList.remove('show');
  document.getElementById('qCard').style.display='block';
  if(cur>=pool.length){showResult();return}
  const q=pool[cur];
  answered=false;
  document.getElementById('qCat').textContent=q.cat;
  document.getElementById('qDiff').textContent=q.diff;
  document.getElementById('qDiff').className='badge '+(DIFF_COLORS[q.diff]||'b-amber');
  document.getElementById('qDomain').textContent=q.domain;
  document.getElementById('qDomain').className='badge '+(DOMAIN_COLORS[q.domain]||'b-purple');
  document.getElementById('qNum').textContent=(cur+1)+' / '+pool.length;
  document.getElementById('progFill').style.width=(cur/pool.length*100)+'%';
  document.getElementById('qTxt').textContent=q.q;
  const oc=document.getElementById('opts');oc.innerHTML='';
  q.opts.forEach((o,i)=>{
    const d=document.createElement('div');d.className='opt';
    d.innerHTML=`<div class="opt-k">${'ABCDE'[i]}</div><div class="opt-t">${o}</div>`;
    d.onclick=()=>selectOpt(i);oc.appendChild(d);
  });
  document.getElementById('exp').className='exp';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('streakBadge').textContent='';
  document.getElementById('streakBadge').className='';
}

function selectOpt(i){
  if(answered)return;answered=true;
  const q=pool[cur];
  document.querySelectorAll('.opt').forEach(o=>o.classList.add('dis'));
  const opts=document.querySelectorAll('.opt');
  if(i===q.ans){opts[i].classList.add('ok');ok++;streak++;if(domainStats[q.domain])domainStats[q.domain].ok++}
  else{opts[i].classList.add('ng');opts[q.ans].classList.add('show-ok');ng++;streak=0}
  total++;
  if(domainStats[q.domain])domainStats[q.domain].total++;
  updateStats();
  document.getElementById('expWhy').textContent=q.why;
  document.getElementById('expTrap').textContent=q.trap;
  const cw=document.getElementById('cmpWrap');
  if(q.cmp&&q.cmp.length){
    cw.innerHTML=`<div class="cmp-wrap"><table class="cmp-tbl"><thead><tr><th>サービス</th><th>特徴</th><th>RTO/特性</th><th>コスト</th><th>備考</th></tr></thead><tbody>`+
    q.cmp.map((r,ri)=>`<tr ${ri===0?'class="rec"':''}><td>${r.svc}</td><td>${r.feature}</td><td>${r.rto}</td><td>${r.cost}</td><td>${r.note}</td></tr>`).join('')+
    `</tbody></table></div>`;
  }else{cw.innerHTML=''}
  document.getElementById('kwWrap').innerHTML=q.kws.map(k=>`<span class="kw">${k}</span>`).join('');
  document.getElementById('exp').className='exp show';
  document.getElementById('nextBtn').style.display='inline-flex';
  if(streak>=3){const sb=document.getElementById('streakBadge');sb.className='streak';sb.textContent=streak+'連続正解 🔥'}
}

function updateStats(){
  document.getElementById('sTotal').textContent=total;
  document.getElementById('sOk').textContent=ok;
  document.getElementById('sNg').textContent=ng;
  document.getElementById('sRate').textContent=total>0?Math.round(ok/total*100)+'%':'—';
}
function nextQ(){cur++;renderQ()}
function skipQ(){cur++;renderQ()}

function showResult(){
  document.getElementById('qCard').style.display='none';
  document.getElementById('result').classList.add('show');
  const rate=total>0?Math.round(ok/total*100):0;
  document.getElementById('resultSc').textContent=ok+'/'+total;
  document.getElementById('resultRate').textContent=rate+'%';
  const circ=314;
  document.getElementById('resultArc').setAttribute('stroke-dasharray',Math.round(circ*rate/100)+' '+circ);
  document.getElementById('resultArc').setAttribute('stroke',rate>=70?'#34D058':rate>=50?'#E3B341':'#F85149');
  document.getElementById('resultMsg').textContent=rate>=70?'合格ライン突破！AZ-104合格まであと一歩！':rate>=50?'半分以上正解！苦手分野を重点的に復習しましょう。':'基礎から丁寧に積み上げていきましょう。参考書で要点を確認！';
  const dg=document.getElementById('domainGrid');
  dg.innerHTML=Object.entries(domainStats).filter(([,v])=>v.total>0).map(([d,v])=>`
    <div class="domain-card">
      <div class="domain-name">${d}</div>
      <div class="domain-bar"><div class="domain-bar-fill" style="width:${Math.round(v.ok/v.total*100)}%"></div></div>
      <div class="domain-rate">${v.ok}/${v.total} · ${Math.round(v.ok/v.total*100)}%</div>
    </div>`).join('');
}

function restart(){
  cur=0;total=0;ok=0;ng=0;streak=0;
  DOMAINS_ARR.slice(1).forEach(d=>{domainStats[d]={ok:0,total:0}});
  activeDomain="全て";
  document.querySelectorAll('.cat').forEach((b,i)=>b.classList.toggle('on',i===0));
  updateStats();buildPool();
  document.getElementById('result').classList.remove('show');
  document.getElementById('qCard').style.display='block';
  renderQ();
}

initCats();buildPool();renderQ();
</script>
</body>
</html>
