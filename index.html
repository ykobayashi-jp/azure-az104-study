<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azure AZ-104 演習 | az-104-study</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root{
  --bg:#0D1117;--surface:#161B22;--surface2:#1C2128;--border:#21262D;--border2:#30363D;
  --text:#E6EDF3;--muted:#7D8590;--hint:#4A5568;
  --blue:#0078D4;--blue-dim:#0D2A45;--blue-text:#60ABFB;
  --green:#34D058;--green-dim:#0D2E1A;--green-text:#56E87A;
  --red:#F85149;--red-dim:#2E0D0D;--red-text:#FF7B72;
  --amber:#E3B341;--amber-dim:#2A1F06;--amber-text:#F0C96A;
  --purple:#C084FC;--purple-dim:#1E1030;--purple-text:#D8A4FC;
  --teal:#39D353;--teal-dim:#0A2E1C;
  --r:10px;--rl:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}
.wrap{max-width:680px;margin:0 auto;padding:1.5rem 1rem 6rem}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;gap:8px;flex-wrap:wrap}
.hdr-left h1{font-size:18px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.hdr-left p{font-size:12px;color:var(--muted);margin-top:2px}
.hdr-right{display:flex;gap:8px;align-items:center}
.btn-study{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r);background:var(--surface);border:1px solid var(--border2);color:var(--muted);font-size:13px;text-decoration:none;transition:all .2s}
.btn-study:hover{border-color:var(--blue);color:var(--blue-text)}
.btn-ghost{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r);background:transparent;border:1px solid transparent;color:var(--muted);font-size:13px;cursor:pointer;transition:all .2s}
.btn-ghost:hover{background:var(--surface);color:var(--text)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.5rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 8px;text-align:center}
.stat-n{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
.stat-l{font-size:11px;color:var(--muted);margin-top:1px}
.cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.cat{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s}
.cat:hover:not(:disabled){border-color:var(--border2);color:var(--text)}
.cat.on{background:var(--blue-dim);border-color:var(--blue);color:var(--blue-text)}
.cat:disabled{opacity:.3;cursor:not-allowed}
.cat-cnt{font-size:10px;opacity:.7}
.prog-track{height:3px;background:var(--surface2);border-radius:2px;margin-bottom:1.25rem;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),#60ABFB);border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.qcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.375rem;margin-bottom:1rem}
.qmeta{display:flex;gap:6px;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500;border:1px solid transparent}
.b-blue{background:var(--blue-dim);color:var(--blue-text);border-color:rgba(0,120,212,.3)}
.b-purple{background:var(--purple-dim);color:var(--purple-text);border-color:rgba(192,132,252,.3)}
.b-amber{background:var(--amber-dim);color:var(--amber-text);border-color:rgba(227,179,65,.3)}
.b-red{background:var(--red-dim);color:var(--red-text);border-color:rgba(248,81,73,.3)}
.b-green{background:var(--green-dim);color:var(--green-text);border-color:rgba(52,208,88,.3)}
.b-teal{background:var(--teal-dim);color:#6EE7A0;border-color:rgba(57,211,83,.3)}
.b-coral{background:#2E100A;color:#FFA07A;border-color:rgba(255,100,50,.3)}
.qnum{font-size:12px;color:var(--hint);margin-left:auto;font-variant-numeric:tabular-nums}
.qtxt{font-size:15px;line-height:1.75;margin-bottom:1.125rem;color:var(--text)}
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1.125rem}
.opt{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border-radius:var(--r);border:1px solid var(--border);border-left:3px solid transparent;cursor:pointer;background:var(--surface2);transition:border-color .15s, background .15s;position:relative;overflow:hidden}
.opt:hover:not(.dis){border-color:var(--border2);border-left-color:var(--blue);background:#1a2332}
.opt.ok{background:var(--green-dim);border-color:rgba(52,208,88,.4);border-left-color:var(--green);animation:slideIn .25s ease}
.opt.ng{background:var(--red-dim);border-color:rgba(248,81,73,.4);border-left-color:var(--red);animation:slideIn .25s ease}
.opt.show-ok{background:var(--green-dim);border-color:rgba(52,208,88,.4);border-left-color:var(--green)}
.opt.dis{cursor:default}
@keyframes slideIn{from{transform:translateX(-4px);opacity:.7}to{transform:translateX(0);opacity:1}}
.opt-k{width:24px;height:24px;border-radius:50%;background:var(--bg);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--muted);flex-shrink:0;margin-top:1px;transition:all .2s}
.opt.ok .opt-k{background:var(--green);color:#000;border-color:var(--green)}
.opt.show-ok .opt-k{background:var(--green);color:#000;border-color:var(--green)}
.opt.ng .opt-k{background:var(--red);color:#fff;border-color:var(--red)}
.opt-t{font-size:13.5px;line-height:1.6;color:var(--text)}
.exp{display:none;margin-bottom:1rem}
.exp.show{display:block}
.exp-why{background:var(--blue-dim);border:1px solid rgba(0,120,212,.2);border-radius:var(--r);padding:12px 14px;margin-bottom:8px}
.exp-lbl{font-size:11px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px}
.exp-lbl.lbl-why{color:var(--blue-text)}
.exp-lbl.lbl-trap{color:var(--amber-text)}
.exp-txt{font-size:13px;line-height:1.7}
.exp-txt.txt-why{color:#A8CFFC}
.exp-trap{background:var(--amber-dim);border:1px solid rgba(227,179,65,.2);border-radius:var(--r);padding:12px 14px;margin-bottom:8px}
.exp-txt.txt-trap{color:#E8D08A}
.cmp-wrap{overflow-x:auto;margin-bottom:8px}
.cmp-tbl{width:100%;border-collapse:collapse;font-size:12px;min-width:440px}
.cmp-tbl th{background:var(--bg);padding:7px 10px;text-align:left;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border)}
.cmp-tbl td{padding:7px 10px;border-bottom:1px solid var(--border);line-height:1.5;color:var(--text)}
.cmp-tbl tr:last-child td{border-bottom:none}
.cmp-tbl .rec td{background:rgba(52,208,88,.07);color:var(--green-text)}
.kws{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.kw{font-size:11px;padding:2px 8px;border-radius:6px;background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.actions{display:flex;gap:8px;justify-content:space-between;align-items:center}
.btn-p{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:var(--r);background:var(--blue);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-p:hover{background:#006abc}
.streak{font-size:12px;background:var(--amber-dim);color:var(--amber-text);border:1px solid rgba(227,179,65,.3);padding:3px 10px;border-radius:6px}
.result{display:none;text-align:center;padding:3rem 1rem 2rem}
.result.show{display:block}
.result-ring{width:100px;height:100px;border-radius:50%;border:3px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;position:relative}
.result-ring svg{position:absolute;top:-3px;left:-3px;transform:rotate(-90deg)}
.result-sc{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums}
.result-sub{font-size:12px;color:var(--muted);margin-top:2px}
.result-msg{font-size:15px;color:var(--text);margin:1rem auto;max-width:360px;line-height:1.6}
.domain-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin:1.25rem 0;text-align:left}
.domain-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px}
.domain-name{font-size:12px;font-weight:600;margin-bottom:4px}
.domain-bar{height:4px;background:var(--bg);border-radius:2px;overflow:hidden;margin-bottom:3px}
.domain-bar-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .6s .2s}
.domain-rate{font-size:11px;color:var(--muted)}
.result-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:1.5rem}
@media(max-width:540px){
  .sidebar-mock{display:none}
  .bottom-nav{display:flex!important}
  .stats{grid-template-columns:repeat(2,1fr)}
}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:.5rem;z-index:100;gap:4px}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;border-radius:var(--r);border:none;background:transparent;color:var(--muted);font-size:10px;cursor:pointer;transition:all .15s;text-decoration:none}
.bnav-item.active,.bnav-item:hover{color:var(--blue-text);background:var(--blue-dim)}
.bnav-item i{font-size:18px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-left">
      <h1><i class="ti ti-brand-azure" style="color:#0078D4;font-size:22px"></i>AZ-104 演習</h1>
      <p>Microsoft Azure Administrator — 全ドメイン対応</p>
    </div>
    <div class="hdr-right">
      <a class="btn-study" href="study.html"><i class="ti ti-book"></i>参考書</a>
      <button class="btn-ghost" onclick="restart()"><i class="ti ti-refresh"></i>リセット</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-n" id="sTotal">0</div><div class="stat-l">回答数</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--green-text)" id="sOk">0</div><div class="stat-l">正解</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--red-text)" id="sNg">0</div><div class="stat-l">不正解</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--blue-text)" id="sRate">—</div><div class="stat-l">正答率</div></div>
  </div>

  <div class="cats" id="catRow"></div>
  <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>

  <div id="qCard" class="qcard">
    <div class="qmeta">
      <span class="badge b-blue" id="qCat"></span>
      <span class="badge" id="qDiff"></span>
      <span class="badge" id="qDomain"></span>
      <span class="qnum" id="qNum"></span>
    </div>
    <div class="qtxt" id="qTxt"></div>
    <div class="opts" id="opts"></div>
    <div class="exp" id="exp">
      <div class="exp-why"><div class="exp-lbl lbl-why">✓ 正解の理由</div><div class="exp-txt txt-why" id="expWhy"></div></div>
      <div class="exp-trap"><div class="exp-lbl lbl-trap">⚠ 落とし穴</div><div class="exp-txt txt-trap" id="expTrap"></div></div>
      <div id="cmpWrap"></div>
      <div class="kws" id="kwWrap"></div>
    </div>
    <div class="actions">
      <button class="btn-ghost" onclick="skipQ()"><i class="ti ti-player-skip-forward"></i>スキップ</button>
      <span id="streakBadge"></span>
      <button class="btn-p" id="nextBtn" onclick="nextQ()" style="display:none"><i class="ti ti-arrow-right"></i>次の問題</button>
    </div>
  </div>

  <div class="result" id="result">
    <div class="result-ring">
      <svg width="106" height="106" viewBox="0 0 106 106"><circle cx="53" cy="53" r="50" fill="none" stroke="var(--border)" stroke-width="6"/><circle id="resultArc" cx="53" cy="53" r="50" fill="none" stroke="#0078D4" stroke-width="6" stroke-linecap="round" stroke-dasharray="0 314"/></svg>
      <div><div class="result-sc" id="resultSc">0/0</div><div class="result-sub" id="resultRate">0%</div></div>
    </div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="domain-grid" id="domainGrid"></div>
    <div class="result-btns">
      <button class="btn-p" onclick="restart()"><i class="ti ti-refresh"></i>もう一度</button>
      <a class="btn-study" href="study.html"><i class="ti ti-book"></i>参考書を見る</a>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="bnav-item active" onclick="restart()"><i class="ti ti-refresh"></i>リセット</button>
  <a class="bnav-item" href="study.html" style="text-decoration:none"><i class="ti ti-book"></i>参考書</a>
</nav>

<script>
const DOMAINS=["全て","ID管理","ストレージ","コンピューティング","ネットワーク","監視","バックアップ"];
const DOMAIN_COLORS={"ID管理":"b-purple","ストレージ":"b-blue","コンピューティング":"b-teal","ネットワーク":"b-coral","監視":"b-amber","バックアップ":"b-green"};
const DIFF_COLORS={"Easy":"b-green","Medium":"b-amber","Hard":"b-red"};

const QS=[
  // ── ID管理 ──
  {domain:"ID管理",cat:"Azure AD / Entra ID",diff:"Medium",q:"新入社員のAzureポータルへのアクセスを許可しながら、サブスクリプションのリソースを変更できないようにしたい。最小権限の原則に従って割り当てるべき組み込みロールは？",opts:["Owner","Contributor","Reader","User Access Administrator"],ans:2,why:"Readerロールはリソースの閲覧のみを許可し、作成・変更・削除の権限を持たない。最小権限の原則に従い、閲覧のみが必要なユーザーにはReaderが最適。",trap:"Contributorはリソースの作成・変更が可能だが、ロールの割り当て権限がない。Ownerはすべての権限を持つため過剰。User Access Administratorはロール割り当て専用。",cmp:[{svc:"Owner",feature:"全権限+ロール割り当て",rto:"最高権限",cost:"—",note:"管理者のみ"},{svc:"Contributor",feature:"作成・変更・削除（ロール割り当て除く）",rto:"開発者向け",cost:"—",note:"変更権限あり"},{svc:"Reader",feature:"閲覧のみ",rto:"最小権限",cost:"—",note:"✓ 推奨"},{svc:"User Access Admin",feature:"ロール割り当てのみ",rto:"アクセス管理専用",cost:"—",note:"特殊用途"}],kws:["RBAC","Reader","最小権限","組み込みロール","Azure RBAC"]},
  {domain:"ID管理",cat:"Azure AD / Entra ID",diff:"Medium",q:"複数のAzureサービス（Key Vault・Storage・SQL Database）にアクセスする必要があるAzure VM上のアプリケーションがある。資格情報をコードやキーボルトに保存せずにアクセスを実現するには？",opts:["サービスプリンシパルを作成し、クライアントシークレットをApp Settingsに保存","ユーザーのAzure AD認証情報を使用","VMにSystem-assigned Managed Identityを有効化し、対象リソースにRBACロールを割り当て","Azure Key Vaultにシークレットを保存してVMから参照"],ans:2,why:"Managed Identity（マネージドID）はAzure ADによりVMに自動でIDが付与され、資格情報を管理することなくAzureサービスへの認証が可能。System-assignedはVMのライフサイクルに紐付き、VMが削除されると自動的に削除される。",trap:"サービスプリンシパルはクライアントシークレットの管理が必要で、ローテーションを手動で行う必要がある。ユーザー認証情報の共有はセキュリティ上不適切。Key Vaultも最初のアクセスに認証が必要。",cmp:[{svc:"Managed Identity",feature:"資格情報不要・自動管理",rto:"最も安全",cost:"無料",note:"✓ 推奨"},{svc:"サービスプリンシパル",feature:"フレキシブル・外部アプリ向け",rto:"シークレット管理が必要",cost:"無料",note:"手動ローテーションが必要"},{svc:"Key Vault",feature:"シークレット集中管理",rto:"初回認証が必要",cost:"低",note:"Managed Identityと組み合わせ推奨"}],kws:["Managed Identity","System-assigned","サービスプリンシパル","資格情報なし","RBAC"]},
  {domain:"ID管理",cat:"条件付きアクセス",diff:"Hard",q:"全社員が多要素認証（MFA）を使用するよう義務付け、さらに会社管理外のデバイスからの管理ポータルアクセスをブロックしたい。最適な方法は？",opts:["各ユーザーアカウントでMFAを個別に有効化","Azure AD Conditional Access Policyを作成し、MFA要求と準拠デバイス条件を設定","Azure AD Identity Protectionのみを使用","Microsoft Authenticatorアプリを全員に配布するだけ"],ans:1,why:"条件付きアクセス（Conditional Access）ポリシーはユーザー・グループ・アプリケーション・デバイス状態などの条件に基づいてアクセス制御を自動化できる。MFA要求と「準拠デバイスが必要」条件を組み合わせることで両方の要件を1つのポリシーで満たせる。",trap:"個別のMFA設定はユーザーが大量の場合管理が困難で例外も作りにくい。Identity Protectionはリスクベースの保護だがポリシーの細かい制御はできない。Authenticatorアプリの配布だけではMFAを強制できない。",cmp:[{svc:"Conditional Access",feature:"条件ベースの自動アクセス制御",rto:"一元管理・柔軟",cost:"Azure AD P1以上",note:"✓ 推奨"},{svc:"Per-user MFA",feature:"ユーザー個別設定",rto:"シンプル",cost:"無料",note:"大規模管理に不向き"},{svc:"Identity Protection",feature:"リスクベース検出",rto:"AI駆動",cost:"Azure AD P2",note:"Conditional Accessと補完的"}],kws:["Conditional Access","MFA","準拠デバイス","Azure AD P1","アクセス制御"]},
  {domain:"ID管理",cat:"PIM",diff:"Hard",q:"グローバル管理者（Global Administrator）ロールを持つ人数を最小化しながら、緊急時にはすぐにロールを取得できるようにしたい。また、ロール使用時には承認と監査ログが必要。最適なソリューションは？",opts:["Global Adminロールを全管理者に常時割り当てる","Azure AD Privileged Identity Management (PIM)でグローバル管理者を『適格（Eligible）』に設定し承認ワークフローを構成","セキュリティグループにGlobal Adminを割り当て、必要なユーザーをグループに追加","Azure Policy を使用してロール割り当てを制限する"],ans:1,why:"PIM（Privileged Identity Management）はJust-In-Timeな特権アクセスを提供し、ロールをEligible（適格）として設定することで必要な時だけロールをアクティベートできる。承認ワークフロー・期限設定・監査ログがすべて組み込まれている。",trap:"常時割り当ては攻撃対象面が大きくなる。セキュリティグループへの割り当てはJIT（Just-In-Time）アクセスを提供しない。Azure PolicyはAzureリソースのガバナンスでAD ロール管理には使えない。",cmp:[{svc:"PIM Eligible",feature:"JIT・承認・監査",rto:"アクティブ化に数分",cost:"Azure AD P2",note:"✓ 推奨"},{svc:"常時割り当て",feature:"即座にアクセス可能",rto:"0分",cost:"無料",note:"攻撃リスクが高い"},{svc:"グループ経由",feature:"一括管理",rto:"即座",cost:"無料",note:"JITなし"}],kws:["PIM","Just-In-Time","Eligible","Global Administrator","特権アクセス管理"]},
  {domain:"ID管理",cat:"ユーザー管理",diff:"Medium",q:"人事システムからAzure AD（Entra ID）へのユーザープロビジョニングを自動化したい。ユーザーの入社・異動・退職に合わせてアカウントを自動作成・更新・無効化するには？",opts:["PowerShellスクリプトを毎日実行してCSVから同期","Azure AD Connect を使用してオンプレミスADと同期","HR システムのSCIM 2.0エンドポイントを活用し、Azure ADのInbound Provisioningを設定","Azure Logic Appsで独自の同期フローを構築"],ans:2,why:"Azure ADのInbound User Provisioningは、SAP SuccessFactors・Workday等のHRシステムからSCIM 2.0経由でユーザーを自動プロビジョニング・デプロビジョニングできる。入社・異動・退職に対応したライフサイクル管理が可能。",trap:"PowerShellスクリプトは手動管理が必要でリアルタイムではない。Azure AD ConnectはオンプレミスADとの同期でHRシステムとの直接統合ではない。Logic Appsは自分でフローを構築する必要があり複雑。",cmp:[{svc:"SCIM Inbound Provisioning",feature:"HRシステムと自動同期",rto:"リアルタイム",cost:"Azure AD P1以上",note:"✓ 推奨"},{svc:"Azure AD Connect",feature:"オンプレミスAD同期",rto:"ほぼリアルタイム",cost:"無料",note:"HRシステム直接統合には不向き"},{svc:"PowerShell",feature:"柔軟なカスタム処理",rto:"スケジュール実行",cost:"無料",note:"リアルタイム不可"}],kws:["SCIM","Inbound Provisioning","HR統合","ユーザーライフサイクル","自動プロビジョニング"]},
  {domain:"ID管理",cat:"ゲストアクセス",diff:"Medium",q:"取引先企業のユーザーにAzure上のSharePoint・Teamsへのアクセスを付与したい。取引先のAzure ADアカウントをそのまま使わせながらアクセス管理をしたい。最適な方法は？",opts:["取引先ユーザーのために新しいAzure ADアカウントを作成","Azure AD B2B Collaboration（外部ゲスト招待）を使用","Azure AD B2Cを使用","VPNを構築して取引先ネットワークから接続させる"],ans:1,why:"Azure AD B2B（Business-to-Business）Collaborationは外部ユーザーを自社のAzure ADにゲストとして招待する機能。取引先は自社のAzure ADまたはMicrosoftアカウントでサインインでき、追加アカウントが不要。アクセス許可はAzure ADのRBACや条件付きアクセスで管理できる。",trap:"新しいアカウントを作成すると別の資格情報を管理する必要があり、取引先のIDライフサイクルに連動しない。B2CはCustomer（消費者）向けで企業間ではない。VPNは必要以上のアクセスを許可する可能性がある。",cmp:[{svc:"B2B Collaboration",feature:"既存IDでゲストアクセス",rto:"招待後すぐ",cost:"無料（一定数まで）",note:"✓ 推奨"},{svc:"B2C",feature:"消費者向けIDプラットフォーム",rto:"—",cost:"MAUベース",note:"企業間には不適切"},{svc:"新規アカウント",feature:"完全なコントロール",rto:"—",cost:"無料",note:"管理負担が大きい"}],kws:["B2B Collaboration","ゲストユーザー","外部ID","招待","クロステナント"]},

  // ── ストレージ ──
  {domain:"ストレージ",cat:"Azure Blob Storage",diff:"Medium",q:"大量の画像データを保存するAzure Blob Storageアカウントがある。過去90日以内のデータは頻繁にアクセスされるが、90日以上のデータはほとんどアクセスされない。コストを最適化する最も効果的な方法は？",opts:["すべてのデータをHot アクセス層に保持","すべてのデータをCool アクセス層に移動","ライフサイクル管理ポリシーを作成して90日後にCool層、365日後にArchive層へ移動","定期的に古いデータを手動で削除"],ans:2,why:"Blob Storageのライフサイクル管理ポリシーはルールベースでブロブの層を自動移行できる。Hot（頻繁アクセス）→Cool（低頻度）→Archive（ほぼアクセスなし）の順でコストが下がる。自動化により管理負担もなくなる。",trap:"すべてをHotに保持するとストレージコストが最も高くなる。すべてCoolにすると新しいデータのアクセスコストが上がる。手動削除は管理負担が大きく誤りのリスクがある。",cmp:[{svc:"Hot層",feature:"頻繁アクセス向け",rto:"低レイテンシー",cost:"ストレージ高・アクセス低",note:"アクティブデータ"},{svc:"Cool層",feature:"低頻度アクセス",rto:"Hot同等",cost:"ストレージ低・アクセス中",note:"30日以上保持推奨"},{svc:"Archive層",feature:"ほぼアクセスなし",rto:"リハイドレート数時間",cost:"ストレージ最安",note:"180日以上推奨"}],kws:["Blob Storage","ライフサイクル管理","Hot","Cool","Archive","コスト最適化"]},
  {domain:"ストレージ",cat:"Azure Files",diff:"Medium",q:"オンプレミスの多数のWindowsサーバーがSMBファイル共有を使用している。これをAzureに移行してオンプレミスサーバーとAzure間でファイルを同期させ、オンプレミスのキャッシュとして機能させたい。最適なソリューションは？",opts:["Azure Blob StorageにSMBで接続","Azure Files + Azure File Syncを使用","Azure NetApp Filesを使用","Azure StorSimpleを使用"],ans:1,why:"Azure File Syncは、Azure Filesをクラウドベースのファイル共有として使用しながら、オンプレミスのWindowsファイルサーバーをキャッシュとして機能させる。クラウドの階層化（Cloud Tiering）により、よく使うファイルをオンプレミスに保持し、残りはAzureに保存することでストレージ効率を最大化できる。",trap:"Blob StorageはSMBをネイティブサポートしない（NFS/SMBはAzure Filesの機能）。Azure NetApp FilesはエンタープライズNAS向けで高価。StorSimpleはレガシーサービス。",cmp:[{svc:"Azure File Sync",feature:"SMB+クラウド階層化",rto:"オンプレキャッシュ",cost:"中",note:"✓ 推奨"},{svc:"Azure Files のみ",feature:"SMBクラウド共有",rto:"VPN/ExpressRoute必要",cost:"低",note:"オンプレキャッシュなし"},{svc:"Azure NetApp Files",feature:"高パフォーマンスNFS/SMB",rto:"低レイテンシー",cost:"高",note:"エンタープライズ向け"}],kws:["Azure File Sync","Azure Files","SMB","クラウド階層化","Cloud Tiering","ハイブリッド"]},
  {domain:"ストレージ",cat:"冗長性",diff:"Medium",q:"東日本リージョンのAzure Storageアカウントに重要なビジネスデータが保存されている。リージョン全体の障害が発生した場合でもデータにアクセスできるようにしたい。かつ、フェイルオーバー後も読み取り可能にしたい。最適な冗長性オプションは？",opts:["LRS（ローカル冗長ストレージ）","ZRS（ゾーン冗長ストレージ）","GRS（地理冗長ストレージ）","GZRS（地理ゾーン冗長ストレージ）"],ans:3,why:"GZRS（Geo-Zone-Redundant Storage）はプライマリリージョンで3つのAvailability Zoneに同期的にデータをコピーし、さらにセカンダリリージョンにも非同期でコピーする。ゾーン障害とリージョン障害の両方から保護される最高レベルの冗長性。Read-access GZRSを選べばセカンダリリージョンからも読み取り可能。",trap:"LRSは同一データセンター内でのみ冗長化でリージョン障害に対応不可。ZRSはゾーン冗長だがリージョン障害には対応不可。GRSはセカンダリへのレプリケーションはあるが、プライマリ内のゾーン冗長がない。",cmp:[{svc:"LRS",feature:"3コピー（同一DC）",rto:"RPO最小",cost:"最安",note:"リージョン障害リスクあり"},{svc:"ZRS",feature:"3AZにコピー",rto:"ゾーン障害対応",cost:"中",note:"リージョン障害リスクあり"},{svc:"GRS",feature:"セカンダリリージョンへコピー",rto:"リージョン障害対応",cost:"高",note:"プライマリゾーン冗長なし"},{svc:"GZRS",feature:"ZRS+GRS",rto:"最高可用性",cost:"最高",note:"✓ 推奨"}],kws:["GZRS","冗長性","GRS","ZRS","地理冗長","リージョン障害"]},
  {domain:"ストレージ",cat:"SAS",diff:"Hard",q:"外部パートナーに特定のBlob Storageコンテナへの一時的な書き込みアクセスを付与したい。アクセスは1時間後に自動的に失効させ、パートナーのIPアドレス範囲のみに制限したい。最適な方法は？",opts:["パートナー用のAzure ADアカウントを作成してContributorロールを付与","ストレージアカウントのアクセスキーをパートナーに共有","IP制限とSASポリシーを組み合わせたService SASを発行","コンテナを一時的にパブリックアクセスに変更"],ans:2,why:"SAS（Shared Access Signature）はストレージリソースへの委任アクセスを提供し、有効期限・許可IP・権限（読み取り/書き込み等）を細かく制御できる。Stored Access PolicyをSASに紐付けることで、発行後も権限を失効させることができる。",trap:"Azure ADアカウントの作成は外部パートナーには複雑すぎ、ライフサイクル管理が必要。アクセスキーはアカウント全体へのフルアクセスで期限設定もできない。パブリックアクセスは誰でもアクセスできてしまう。",cmp:[{svc:"SAS (Service SAS)",feature:"細かい権限・期限・IP制限",rto:"即時発行",cost:"無料",note:"✓ 推奨"},{svc:"アクセスキー",feature:"シンプル",rto:"即時",cost:"無料",note:"フルアクセス・期限なし"},{svc:"Azure AD + RBAC",feature:"統合認証",rto:"—",cost:"無料",note:"外部パートナーには複雑"}],kws:["SAS","Shared Access Signature","Stored Access Policy","IP制限","一時アクセス"]},
  {domain:"ストレージ",cat:"Azure Disk",diff:"Medium",q:"Azure VMのOSディスクに対して、1日1回のスナップショットを30日間保持する自動バックアップを構成したい。最も簡単な方法は？",opts:["PowerShellスクリプトをAutomationで毎日実行","Azure Backupを使用してVMバックアップポリシーを設定","ストレージアカウントに手動でスナップショットを作成","Azure Site Recoveryを使用"],ans:1,why:"Azure BackupはVMレベルのバックアップをポリシーベースで自動化できる。バックアップポリシーでスケジュール（毎日）・保持期間（30日）を設定するだけで、エージェントのインストールも不要（Azure VM Backup）。復旧も簡単に実行できる。",trap:"PowerShellスクリプトは管理が複雑で障害時の対応が必要。手動スナップショットは自動化できない。Site RecoveryはDR（障害復旧）向けでバックアップの用途とは異なる。",cmp:[{svc:"Azure Backup",feature:"ポリシーベース自動バックアップ",rto:"RTO/RPO設定可能",cost:"バックアップデータ量",note:"✓ 推奨"},{svc:"スナップショット",feature:"シンプル・高速",rto:"手動",cost:"スナップショット料金",note:"自動化が別途必要"},{svc:"Site Recovery",feature:"リージョン間DR",rto:"分単位",cost:"高",note:"バックアップとは別用途"}],kws:["Azure Backup","バックアップポリシー","スナップショット","VM Backup","保持期間"]},

  // ── コンピューティング ──
  {domain:"コンピューティング",cat:"VM管理",diff:"Medium",q:"本番VMを週末の間（土曜夜から月曜朝まで）停止してコストを削減したい。毎週自動的に実行したい。最もシンプルな方法は？",opts:["手動で毎週停止・起動する","Azure Automationのスケジュールを設定してStart/Stop VMs runbookを使用","Logic AppsでVMの起動停止フローを作成","Azure DevOpsパイプラインで自動化"],ans:1,why:"Azure AutomationのStart/Stop VMs during off-hours機能（またはAutomation Runbook）は、VMをスケジュールに従って自動的に起動・停止する。夜間・週末の停止でコストを大幅に削減できる組み込みの仕組みが用意されている。",trap:"手動対応は忘れるリスクがある。Logic Appsは機能するが設定が複雑。Azure DevOpsはCI/CD向けでVM管理が主用途ではない。",cmp:[{svc:"Azure Automation",feature:"スケジュール自動起動停止",rto:"設定が簡単",cost:"無料枠あり",note:"✓ 推奨"},{svc:"Logic Apps",feature:"視覚的ワークフロー",rto:"柔軟",cost:"実行回数課金",note:"過剰に複雑"},{svc:"手動",feature:"—",rto:"—",cost:"無料",note:"忘れるリスク"}],kws:["Azure Automation","Start/Stop VM","スケジュール","コスト削減","Runbook"]},
  {domain:"コンピューティング",cat:"スケーリング",diff:"Medium",q:"Webアプリを実行するVM Scale Set（VMSS）がある。CPU使用率が70%を超えた場合にインスタンスを追加し、30%を下回ったら削減したい。最適な設定は？",opts:["固定数のVMを常時稼働させる","VM Scale Setにカスタム自動スケーリングルールを設定してCPUメトリクスに基づいてスケールアウト/インを構成","手動でVMを追加・削除する","Azure Load Balancerで複数VMに分散するだけ"],ans:1,why:"VM Scale Setの自動スケーリング（Auto Scale）はメトリクス（CPU・メモリ・カスタム）に基づいてインスタンス数を自動的に増減できる。スケールアウト（追加）とスケールイン（削減）の閾値とインスタンス数の増減値を個別に設定できる。",trap:"固定数ではトラフィック変動に対応できない。手動スケーリングはリアルタイム対応が困難。Load Balancerだけではスケーリングは行えない（分散のみ）。",cmp:[{svc:"VMSS Auto Scale",feature:"メトリクスベース自動スケール",rto:"数分",cost:"VMコストのみ",note:"✓ 推奨"},{svc:"固定スケール",feature:"予測可能",rto:"即時",cost:"常時VM料金",note:"コスト非効率"},{svc:"スケジュールスケール",feature:"時間帯ベース",rto:"事前定義",cost:"VMコストのみ",note:"メトリクスに非対応"}],kws:["VM Scale Set","VMSS","Auto Scale","CPU","自動スケーリング","スケールアウト"]},
  {domain:"コンピューティング",cat:"App Service",diff:"Medium",q:"Azure App ServiceでホストされているWebアプリに対して、デプロイ前に本番環境でのテストを行いたい。新バージョンのデプロイ後に問題があった場合は即座に以前のバージョンに戻せるようにしたい。最適な機能は？",opts:["毎回新しいApp Serviceを作成してDNSを切り替える","App ServiceのDeployment Slots（デプロイスロット）を使用","Azure Traffic Managerで複数リージョンに分散","Dockerコンテナを使って手動で切り替え"],ans:1,why:"Deployment Slotsは本番スロット（production）とは別のスロット（staging等）でアプリをテストし、問題なければスロットをスワップ（入れ替え）して本番に昇格できる。スワップはウォームアップ後に実行されるため、ダウンタイムがなく、問題時はすぐに元のスロットに戻せる。",trap:"DNSの切り替えはTTLのため即時ではなく、ウォームアップも別途必要。Traffic Managerはマルチリージョン分散向けでこの要件には過剰。手動のコンテナ切り替えは複雑。",cmp:[{svc:"Deployment Slots",feature:"ゼロダウンタイムスワップ・即時ロールバック",rto:"秒単位",cost:"スタンダード以上",note:"✓ 推奨"},{svc:"DNS切り替え",feature:"シンプル",rto:"TTL依存",cost:"無料",note:"ウォームアップなし"},{svc:"Traffic Manager",feature:"マルチリージョン分散",rto:"DNS依存",cost:"有料",note:"要件に過剰"}],kws:["Deployment Slots","スロットスワップ","Blue/Green","ロールバック","ゼロダウンタイム"]},
  {domain:"コンピューティング",cat:"コンテナ",diff:"Hard",q:"マイクロサービスアーキテクチャを採用したWebアプリをAzureにデプロイしたい。サービス検出・負荷分散・スケーリング・セルフヒーリングが必要。インフラ管理は最小化したい。最適なサービスは？",opts:["Azure VM上に手動でDockerを構築","Azure Container Instances（ACI）を使用","Azure Kubernetes Service（AKS）を使用","Azure Container Apps（ACA）を使用"],ans:2,why:"AKS（Azure Kubernetes Service）はマネージドKubernetesを提供し、サービス検出・負荷分散・自動スケーリング（HPA）・セルフヒーリング・ローリングアップデートをネイティブにサポートする。コントロールプレーンはAzureが管理するためインフラ管理負担が軽減される。",trap:"VM上のDockerは管理負担が大きくオーケストレーション機能がない。ACIは単一コンテナの実行に適しているがオーケストレーション機能が限定的。ACAはサーバーレスコンテナでシンプルなケースに向いているが、複雑なK8sワークロードにはAKSが適切。",cmp:[{svc:"AKS",feature:"フルK8sオーケストレーション",rto:"高い柔軟性",cost:"ノードVM料金",note:"✓ マイクロサービス向け"},{svc:"ACA",feature:"サーバーレスコンテナ",rto:"シンプル",cost:"消費ベース",note:"シンプルなワークロード向け"},{svc:"ACI",feature:"単一コンテナ実行",rto:"高速起動",cost:"秒単位課金",note:"オーケストレーションなし"}],kws:["AKS","Kubernetes","マイクロサービス","HPA","セルフヒーリング","コンテナオーケストレーション"]},
  {domain:"コンピューティング",cat:"Azure Functions",diff:"Medium",q:"Blob Storageに新しいファイルがアップロードされるたびに画像をリサイズする処理を実行したい。サーバーのプロビジョニングなしに最もコスト効率よく実装する方法は？",opts:["常時起動のVMにファイル監視スクリプトを配置","Azure App Service WebJobsを使用","Azure FunctionsのBlob Storageトリガーを使用","Logic Appsで毎分Blobコンテナをポーリング"],ans:2,why:"Azure FunctionsのBlobトリガーは新しいBlobが作成されると自動的に関数を起動する。サーバーレスのため実行時間のみ課金され、スケーリングも自動。従量課金プランでは無料枠も提供されている。",trap:"常時起動VMは使用しない時間帯もコストが発生する。WebJobsはApp Serviceのプロビジョニングが必要。Logic Appsのポーリングは新規アップロードを即座に検知できず遅延が生じる。",cmp:[{svc:"Functions Blob Trigger",feature:"イベント駆動・サーバーレス",rto:"秒以内",cost:"実行時間のみ",note:"✓ 推奨"},{svc:"Logic Apps",feature:"ローコード・ビジュアル",rto:"ポーリング間隔",cost:"実行回数",note:"遅延あり"},{svc:"VM常時起動",feature:"完全なコントロール",rto:"即時",cost:"常時VM料金",note:"コスト非効率"}],kws:["Azure Functions","Blobトリガー","サーバーレス","イベント駆動","従量課金"]},

  // ── ネットワーク ──
  {domain:"ネットワーク",cat:"VNet",diff:"Medium",q:"本番環境（VNet-Prod）と開発環境（VNet-Dev）の2つのVNetがある。本番のSQL ServerにのみDevからアクセスさせたい。インターネットを経由せずに低レイテンシーで接続したい。最適な方法は？",opts:["両VNetをパブリックIPで接続","VNet Peering（VNetピアリング）を使用して2つのVNetを接続","サイト間VPNで接続","Azure FirewallをVNet間に配置"],ans:1,why:"VNet Peeringは2つのVNet間をMicrosoftのバックボーンネットワークで接続し、インターネットを経由しない低レイテンシー・高帯域幅の接続を提供する。NSG（ネットワークセキュリティグループ）でトラフィックを特定のリソース（SQL Server）に限定できる。",trap:"パブリックIPを使った接続はインターネットを経由しセキュリティリスクが高い。VPNはオンプレミス接続向けでVNet間には低レイテンシーのPeeringが適切。Azure Firewallは通常インターネット向けトラフィックのフィルタリングに使う。",cmp:[{svc:"VNet Peering",feature:"低レイテンシー・バックボーン接続",rto:"即時",cost:"転送データ量",note:"✓ 推奨"},{svc:"VPN Gateway",feature:"暗号化トンネル",rto:"VPNスループット制限",cost:"ゲートウェイ料金",note:"オンプレミス接続向け"},{svc:"Azure Firewall",feature:"L7フィルタリング",rto:"低レイテンシー",cost:"高",note:"VNet間の詳細制御に追加"}],kws:["VNet Peering","VNet","バックボーン接続","NSG","低レイテンシー"]},
  {domain:"ネットワーク",cat:"NSG",diff:"Medium",q:"WebサブネットからDBサブネットへのポート1433（SQL）のみ許可し、それ以外のすべてのトラフィックをブロックしたい。またインターネットからのDBへの直接アクセスも防ぎたい。どのリソースにNSGを適用するか？",opts:["VNet全体にNSGを1つ適用","WebサブネットとDBサブネット両方、またはDBサブネットのNICにNSGを適用","インターネットゲートウェイにNSGを適用","Azure FirewallのルールとしてNSGを設定"],ans:1,why:"NSGはサブネットまたはNIC（ネットワークインターフェース）に適用できる。DBサブネットのNSGで「Webサブネットからポート1433のみ許可、その他拒否」というルールを設定することで、WebからDBへの必要なトラフィックのみ許可できる。Denyアクセスルールはインターネットからのアクセスも自動的にブロックする（デフォルトDenyルール）。",trap:"VNet全体への単一NSGでは細かい制御が難しい。インターネットゲートウェイにはNSGを直接適用できない。Azure FirewallとNSGは別のサービスでNSGはL3-L4の基本制御。",cmp:[{svc:"サブネットNSG",feature:"サブネット全体への適用",rto:"シンプルな管理",cost:"無料",note:"✓ 推奨"},{svc:"NIC NSG",feature:"個別VMへの適用",rto:"細かい制御",cost:"無料",note:"管理が複雑"},{svc:"Azure Firewall",feature:"L7フィルタリング・ログ",rto:"より高度な制御",cost:"高",note:"NSGと併用可能"}],kws:["NSG","ネットワークセキュリティグループ","サブネット","ポート制限","デフォルトDeny"]},
  {domain:"ネットワーク",cat:"DNS",diff:"Medium",q:"Azure Blob StorageとSQL Databaseへのアクセスをパブリックインターネットを経由させずに、VNet内からプライベートに行いたい。最適な構成は？",opts:["サービスエンドポイント（Service Endpoint）を使用","Private Endpoint + Azure Private DNSゾーンを使用","VNet GatewayとVPNを使用","NATゲートウェイを使用"],ans:1,why:"Private Endpointはサービスへのプライベートなネットワーク接続をVNetのプライベートIPアドレスとして作成する。Private DNS Zoneと組み合わせることで、サービスのFQDNが自動的にプライベートIPに解決される。トラフィックがMicrosoftのバックボーンのみを経由し、インターネットを経由しない。",trap:"Service EndpointはVNet外からのトラフィックをサービス側でブロックするが、プライベートIPは提供されない。VPN GatewayはオンプレミスとのVPN接続向け。NATゲートウェイはアウトバウンドのNAT変換でリソースへのプライベートアクセスは提供しない。",cmp:[{svc:"Private Endpoint",feature:"プライベートIP・完全に非公開",rto:"最も安全",cost:"エンドポイント料金",note:"✓ 推奨"},{svc:"Service Endpoint",feature:"ルーティング最適化",rto:"設定シンプル",cost:"無料",note:"パブリックIPは残る"},{svc:"VPN Gateway",feature:"オンプレミス接続",rto:"暗号化",cost:"ゲートウェイ料金",note:"この用途には不向き"}],kws:["Private Endpoint","Private DNS","サービスエンドポイント","プライベート接続","VNet"]},
  {domain:"ネットワーク",cat:"ロードバランサー",diff:"Hard",q:"インターネット向けWebアプリへのリクエストをAzure VMのバックエンドプールに分散したい。さらに、URLパスに基づいて異なるバックエンドに振り分けたい（/api/→APIサーバー、/static/→Storageアカウント）。最適なサービスは？",opts:["Azure Load Balancer（Basic）","Azure Load Balancer（Standard）","Azure Application Gateway","Azure Front Door"],ans:2,why:"Application GatewayはL7（HTTP/HTTPS）ロードバランサーで、URLパスベースルーティング・ホストベースルーティング・SSL終端・WAF統合などHTTP特化の機能を提供する。/api/と/static/へのパスベースルーティングはアプリケーションゲートウェイのURL-based routingで実現できる。",trap:"Azure Load Balancer（BasicとStandard）はL4（TCP/UDP）ロードバランサーでURLパスを解析できない。Azure Front DoorはグローバルなCDN・WAFサービスで、このケースは単一リージョンなのでApplication Gatewayが適切。",cmp:[{svc:"Application Gateway",feature:"L7・URLパスルーティング・WAF",rto:"リージョン単位",cost:"中",note:"✓ 推奨"},{svc:"Standard Load Balancer",feature:"L4・高パフォーマンス",rto:"低レイテンシー",cost:"低",note:"URLパス不可"},{svc:"Front Door",feature:"グローバルL7・CDN・WAF",rto:"マルチリージョン",cost:"高",note:"グローバル向け"}],kws:["Application Gateway","URLパスルーティング","L7","WAF","ロードバランサー"]},
  {domain:"ネットワーク",cat:"ExpressRoute",diff:"Hard",q:"オンプレミスのデータセンターとAzure間で、インターネットを経由しない専用接続が必要。最低10Gbpsの帯域が必要で、接続が1本切れてもサービスを継続したい。最適な構成は？",opts:["サイト間VPN（IPSec）を2本構成","ExpressRoute回路を1本構成","ExpressRoute回路を2本（異なるプロバイダー）＋ExpressRoute Global Reach","ExpressRoute + サイト間VPNをフェイルオーバーとして構成"],ans:2,why:"冗長なExpressRoute構成では、2つの異なるプロバイダーからの回路を使用することで、1つのプロバイダー障害でも接続を維持できる。ExpressRouteは最大100Gbpsをサポートし、10Gbpsの要件を満たす。Global Reachを使うとオンプレミス拠点間もAzureのバックボーン経由で接続できる。",trap:"VPNはインターネットを経由するため専用接続の要件を満たさない。ExpressRoute 1本は冗長性が不足。VPN+ExpressRouteはExpressRoute切断時にVPN（インターネット経由）にフォールバックするので完全な専用接続ではなくなる。",cmp:[{svc:"ExpressRoute×2（別プロバイダー）",feature:"完全冗長・専用接続",rto:"フェイルオーバー自動",cost:"最高",note:"✓ 推奨"},{svc:"ExpressRoute×1",feature:"専用接続",rto:"単一障害点あり",cost:"高",note:"冗長性不足"},{svc:"S2S VPN×2",feature:"冗長化可能",rto:"インターネット経由",cost:"低",note:"専用接続ではない"}],kws:["ExpressRoute","専用接続","冗長化","10Gbps","Global Reach","ハイブリッド"]},

  // ── 監視 ──
  {domain:"監視",cat:"Azure Monitor",diff:"Medium",q:"Azure VM・App Service・SQL Databaseのメトリクスを一か所で可視化し、チームでリアルタイムに監視したい。また、CPUが80%を超えた場合にメールで通知したい。最適な構成は？",opts:["各リソースのポータル画面を個別に確認","Azure MonitorとAzure Dashboardで複数リソースのメトリクスを一元表示し、メトリクスアラートルールを作成","Azure Service Healthのみを使用","Application Insightsのみを使用"],ans:1,why:"Azure Monitorはインフラ・アプリ・ネットワーク全体のメトリクス・ログ・トレースを統合監視するプラットフォーム。メトリクスエクスプローラーでカスタムダッシュボードを作成し、アラートルールでCPU閾値を設定してAction Group経由でメール通知できる。",trap:"個別確認は俯瞰的な監視ができない。Service HealthはAzure自体の障害情報で自分のリソースのメトリクス監視ではない。Application InsightsはアプリのAPM（トレース・依存関係）向けでインフラメトリクスの一元管理ではない。",cmp:[{svc:"Azure Monitor",feature:"全リソース統合監視・アラート",rto:"リアルタイム",cost:"データ取り込み量",note:"✓ 推奨"},{svc:"Application Insights",feature:"アプリAPM・トレース",rto:"リアルタイム",cost:"データ量",note:"アプリ特化・インフラ監視は別途"},{svc:"Service Health",feature:"Azureサービス障害情報",rto:"障害発生時",cost:"無料",note:"自リソースのメトリクスではない"}],kws:["Azure Monitor","メトリクス","アラートルール","Action Group","ダッシュボード"]},
  {domain:"監視",cat:"Log Analytics",diff:"Medium",q:"複数のAzure VMとオンプレミスサーバーのOSログ・イベントログを中央で収集・検索・分析したい。ログを30日間保持し、Kusto Query Language（KQL）で分析したい。最適な構成は？",opts:["各VMのAzure Storageにログを保存して手動で確認","Log Analytics ワークスペースを作成し、Azure Monitor Agent（AMA）でVMのログを収集","Azure Event Hubsにログを送信","Azure Storage Accountのみに保存"],ans:1,why:"Log Analytics ワークスペースはAzureとオンプレミスのリソースからログを集中収集し、KQL（Kusto Query Language）で柔軟なクエリ・分析が可能。Azure Monitor Agent（AMA）をVMにインストールするだけで収集が始まり、保持期間も設定できる。",trap:"Storageへの保存はKQLで分析できず検索が困難。Event Hubsはストリームデータのルーティングでログ分析は別途必要。Azure Storageだけでは一元的なクエリができない。",cmp:[{svc:"Log Analytics",feature:"KQL・一元分析・保持設定",rto:"数分での取り込み",cost:"データ取り込み量",note:"✓ 推奨"},{svc:"Azure Storage",feature:"安価な長期保存",rto:"手動確認",cost:"最安",note:"分析機能なし"},{svc:"Event Hubs",feature:"高スループットストリーム",rto:"リアルタイム",cost:"中",note:"分析は別途必要"}],kws:["Log Analytics","KQL","Azure Monitor Agent","ログ収集","ワークスペース"]},
  {domain:"監視",cat:"Application Insights",diff:"Medium",q:"Azure App ServiceでホストされているWebアプリのレスポンスタイム・エラー率・依存関係（SQL・外部API）の呼び出し状況をリアルタイムに監視したい。最適なサービスは？",opts:["Azure Monitor メトリクスエクスプローラー","Application Insights","Azure Network Watcher","Azure Service Health"],ans:1,why:"Application Insights はアプリケーションのAPM（Application Performance Management）サービスで、リクエスト・依存関係・例外・パフォーマンスカウンターを自動収集する。アプリコードへのSDK統合またはコードレスアタッチで設定でき、ライブメトリクス・アプリケーションマップ・障害分析が使える。",trap:"Azure MonitorメトリクスはインフラレベルのCPU/メモリ等で依存関係の追跡はできない。Network WatcherはネットワークのフローログやNSG診断向け。Service HealthはAzureサービス自体の障害情報。",cmp:[{svc:"Application Insights",feature:"APM・依存関係・トレーシング",rto:"リアルタイム",cost:"データ量",note:"✓ 推奨"},{svc:"Azure Monitor",feature:"インフラメトリクス",rto:"リアルタイム",cost:"データ量",note:"依存関係追跡なし"},{svc:"Network Watcher",feature:"ネットワーク診断",rto:"オンデマンド",cost:"一部有料",note:"アプリ監視ではない"}],kws:["Application Insights","APM","依存関係","トレーシング","ライブメトリクス"]},
  {domain:"監視",cat:"アラート",diff:"Hard",q:"あるAzure SQLデータベースのDTU使用率が90%を超えた状態が5分間続いた場合に、自動的にサービスティアをアップグレードするロジックを実装したい。最適な構成は？",opts:["Azure Portalで手動で確認してアップグレード","Azure Monitor アラートルール + Action Group + Azure Automation Runbook","Logic Appsでポーリングして確認","Azure Advisor の推奨事項を定期的に確認"],ans:1,why:"Azure Monitor アラートルールでDTU使用率の条件（90%超・5分）を設定し、Action GroupでAzure Automation Runbookをトリガーする。RunbookにSQL Database のSKU変更のコードを記述することで自動スケールアップが実現する。",trap:"手動確認は遅延が生じ、5分の条件が満たされても即座に対応できない。Logic Appsでのポーリングは遅延が生じメトリクスの集約条件の設定が複雑。Azure Advisorは推奨事項の表示のみで自動化機能はない。",cmp:[{svc:"Monitor Alert + Automation",feature:"条件トリガー・自動スケール",rto:"条件達成後数分",cost:"Automation料金",note:"✓ 推奨"},{svc:"Logic Apps",feature:"ビジュアルワークフロー",rto:"ポーリング間隔",cost:"実行回数",note:"メトリクス集約が複雑"},{svc:"手動",feature:"完全なコントロール",rto:"即時対応不可",cost:"無料",note:"スケール遅延"}],kws:["Azure Monitor","アラートルール","Action Group","Automation Runbook","自動スケール"]},

  // ── バックアップ ──
  {domain:"バックアップ",cat:"Azure Backup",diff:"Medium",q:"東日本リージョンにある複数のAzure VMのバックアップを設定したい。バックアップデータ自体がリージョン障害で失われないようにし、かつコストを最小化したい。Recovery Services Vaultのどのストレージ冗長オプションを選ぶべきか？",opts:["LRS（ローカル冗長ストレージ）","GRS（地理冗長ストレージ）","ZRS（ゾーン冗長ストレージ）","どれでも変わらない"],ans:1,why:"Recovery Services VaultのGRS（地理冗長）オプションはバックアップデータをプライマリリージョン（東日本）だけでなくセカンダリリージョン（西日本）にも自動でコピーする。リージョン障害時にもセカンダリリージョンからバックアップデータにアクセス・リストアできる。Cross Region Restore機能を使うとセカンダリへのリストアも可能。",trap:"LRSは同一リージョンの複数のストレージノードにコピーするだけで、リージョン障害の場合はバックアップごと失われる可能性がある。ZRSはゾーン障害には対応するがリージョン障害には対応しない。",cmp:[{svc:"GRS",feature:"リージョン間冗長・Cross Region Restore",rto:"リージョン障害対応",cost:"LRSの約2倍",note:"✓ 推奨"},{svc:"LRS",feature:"低コスト",rto:"ゾーン/リージョン障害に弱い",cost:"最安",note:"リージョン障害リスクあり"},{svc:"ZRS",feature:"ゾーン冗長",rto:"ゾーン障害対応",cost:"中",note:"リージョン障害には非対応"}],kws:["Recovery Services Vault","GRS","バックアップ冗長性","Cross Region Restore","リージョン障害"]},
  {domain:"バックアップ",cat:"Azure Site Recovery",diff:"Hard",q:"本番Azure VMが東日本リージョンで稼働している。リージョン全体の障害が発生した際に、西日本リージョンへ数分以内にフェイルオーバーできるDR構成を組みたい。最適なサービスは？",opts:["毎日GRSストレージにVMのスナップショットを保存","Azure Backupを使用して定期バックアップ","Azure Site Recovery（ASR）でVMをセカンダリリージョンにレプリケーション","手動でVMを西日本に再構築するRunbookを用意"],ans:2,why:"Azure Site Recovery（ASR）は継続的なレプリケーションにより、VMのデータをセカンダリリージョンにリアルタイムでコピーする。フェイルオーバーはPortalまたはRecovery Planから数クリックで実行でき、RPO（復旧ポイント目標）は数分、RTO（復旧時間目標）も数分〜十数分を実現できる。",trap:"スナップショットは最終スナップショット以降のデータが失われる（RPOが大きい）。Azure Backupは長期保管向けでフェイルオーバーには不向き（RTO が大きい）。手動再構築はRTOが数時間以上になる。",cmp:[{svc:"Azure Site Recovery",feature:"継続レプリケーション・自動フェイルオーバー",rto:"RTO分単位・RPO秒単位",cost:"VM料金+ASR料金",note:"✓ 推奨"},{svc:"Azure Backup",feature:"定期バックアップ",rto:"RTO数時間",cost:"低",note:"DRには不向き"},{svc:"スナップショット",feature:"シンプル",rto:"RTO数時間以上",cost:"スナップショット料金",note:"RPOが大きい"}],kws:["Azure Site Recovery","DR","フェイルオーバー","レプリケーション","RPO","RTO","リージョン間"]},
  {domain:"バックアップ",cat:"Azure Backup",diff:"Medium",q:"オンプレミスのWindowsサーバー上のファイル・フォルダーをAzureにバックアップし、99日間保持したい。オンプレミスサーバーの管理は継続しつつ、バックアップのみをクラウドに移したい。最適な方法は？",opts:["手動でAzure Blob StorageにファイルをアップロードするスクリプトをTaskSchedulerで実行","Azure Backup（MARSエージェント）をサーバーにインストールしRecovery Services Vaultにバックアップ","Azure File Syncでクラウドと同期","Azure Migrate でサーバーをAzureに移行"],ans:1,why:"MARS（Microsoft Azure Recovery Services）エージェントはオンプレミスWindowsサーバーにインストールし、ファイル・フォルダー・システム状態をAzure Recovery Services Vaultに直接バックアップできる。保持ポリシーで最大99年まで設定でき、AzureポータルからバックアップジョブとリカバリーポイントをGUIで管理できる。",trap:"手動スクリプトは管理負担が大きく失敗時の検知が難しい。File SyncはDRバックアップではなくクラウドへのファイル同期で、誤削除も同期されてしまう。Migrateはサーバーをクラウドに移行するもので、オンプレ継続の要件に反する。",cmp:[{svc:"MARS Agent",feature:"オンプレ→Azure直接バックアップ",rto:"数時間",cost:"バックアップデータ量",note:"✓ 推奨"},{svc:"Azure File Sync",feature:"クラウドとのファイル同期",rto:"リアルタイム",cost:"中",note:"バックアップではない"},{svc:"DPM/MABS",feature:"高機能バックアップ",rto:"高機能",cost:"DPM/MABSライセンス",note:"大規模環境向け"}],kws:["MARS","Azure Backup","Recovery Services Vault","オンプレミス","ファイルバックアップ"]},

  // ── ID管理 追加分 ──
  {domain:"ID管理",cat:"条件付きアクセス",diff:"Medium",q:"社外ネットワーク（会社管理外のデバイス）からAzure管理ポータルにアクセスしようとするユーザーに対し、必ずMFAを要求したい。最適な構成は？",opts:["すべてのユーザーのパスワードを複雑にする","条件付きアクセスポリシーで「場所：社外」かつ「アプリ：Azure Management」の条件でMFAを要求","Azure ADの全ユーザーにMFAを強制する（レガシーの強制MFA）","Azure Firewallで社外IPをブロック"],ans:1,why:"条件付きアクセス（Conditional Access）ポリシーは「誰が」「何に」「どこから」アクセスするかに応じてMFA要求・アクセスブロックなどのアクセス制御を適用できる。場所の条件（ネームドロケーションで社内IPを定義）とクラウドアプリの条件を組み合わせて社外からの管理ポータルアクセスにのみMFAを要求できる。",trap:"全ユーザーへのMFA強制（レガシー）は細かい条件が設定できず、社内からのアクセスにもMFAが適用されてしまう。FirewallでのブロックはMFAではなく完全遮断になる。パスワード複雑化だけでは認証強化に不十分。",cmp:[{svc:"条件付きアクセス",feature:"条件ベース・細粒度制御",rto:"即時適用",cost:"P1以上必要",note:"✓ 推奨"},{svc:"レガシーMFA強制",feature:"全ユーザー強制",rto:"即時",cost:"無料",note:"細かい条件設定不可"},{svc:"Firewall",feature:"IPベースブロック",rto:"即時",cost:"高",note:"MFAではなく遮断"}],kws:["条件付きアクセス","Conditional Access","MFA","ネームドロケーション","Azure Management"]},
  {domain:"ID管理",cat:"ロール管理",diff:"Medium",q:"あるユーザーをサブスクリプション内の特定のリソースグループ（RG-Prod）だけに限定して、VMの起動・停止・再起動ができるようにしたい。他のリソースグループへのアクセスは不可。最適な設定は？",opts:["サブスクリプションスコープでOwnerロールを付与","RG-ProdスコープでVirtual Machine Contributorロールを付与","テナント全体でContributorロールを付与","RG-ProdスコープでReaderロールを付与"],ans:1,why:"Azure RBACはスコープ（管理グループ／サブスクリプション／リソースグループ／リソース）とロールの組み合わせで権限を制御する。Virtual Machine Contributorロールはコンピューティングリソースへのフル操作権限を持ち、RG-Prodスコープで付与することで他のリソースグループへのアクセスを排除できる。最小権限の原則を満たす構成。",trap:"サブスクリプションスコープのOwnerは過剰権限で他のRGにもアクセスできてしまう。Readerは読み取りのみでVM操作不可。テナントスコープはさらに広い範囲への権限付与になる。",cmp:[{svc:"RGスコープ+VMContributor",feature:"最小権限・スコープ限定",rto:"即時",cost:"無料",note:"✓ 推奨"},{svc:"サブスコープ+Owner",feature:"全権限",rto:"即時",cost:"無料",note:"権限過剰"},{svc:"Contributor（テナント）",feature:"テナント全体",rto:"即時",cost:"無料",note:"スコープ過剰"}],kws:["RBAC","Virtual Machine Contributor","リソースグループ","スコープ","最小権限"]},
  {domain:"ID管理",cat:"PIM",diff:"Hard",q:"グローバル管理者（Global Administrator）が必要なタスクは月に数回しかない。常時有効にしておくとセキュリティリスクが高い。使うときだけ昇格できる仕組みを実装したい。最適な機能は？",opts:["Global Administratorをユーザーに常時付与しておく","Privileged Identity Management（PIM）で対象ロール（Eligible）として設定し、必要時にアクティブ化","別のユーザーアカウントを管理者用に作成して物理的に管理","Custom Roleを作って権限を分割"],ans:1,why:"Azure AD PIM（Privileged Identity Management）は特権ロールを「対象（Eligible）」として設定し、必要なときに承認フロー・MFA・理由入力を経てロールをアクティブ化（時間制限付き）できる。使用後は自動的にロールが非アクティブになるためリスクを最小化できる。アクティブ化の履歴・監査ログも保存される。",trap:"常時付与はロール乗っ取りリスクが高い。別アカウント管理は管理負担が大きくPIMの監査・承認機能がない。Custom Roleでは特権操作の一時昇格という目的は実現できない。",cmp:[{svc:"PIM（対象ロール）",feature:"Just-In-Time昇格・承認・監査",rto:"アクティブ化数秒",cost:"P2必要",note:"✓ 推奨"},{svc:"常時付与",feature:"即時利用可能",rto:"常に有効",cost:"無料",note:"セキュリティリスク高"},{svc:"別アカウント",feature:"アカウント分離",rto:"ログインが必要",cost:"無料",note:"監査・承認機能なし"}],kws:["PIM","Privileged Identity Management","Just-In-Time","Eligible","グローバル管理者","特権管理"]},
  {domain:"ID管理",cat:"ゲストアクセス",diff:"Medium",q:"外部パートナー企業のユーザー（partner@contoso.com）に自社のAzureリソース（特定のRG）への読み取りアクセスを付与したい。パートナーは自社のAzure ADアカウントを持っている。最適な方法は？",opts:["パートナー用のAzure ADアカウントを自社テナントに新規作成してパスワードを共有","Azure AD B2B招待でゲストユーザーとして招待し、対象RGにReaderロールをRBACで付与","パートナーに自社サービスプリンシパルの認証情報を共有","Azure AD B2Cを使用してゲスト認証する"],ans:1,why:"Azure AD B2B（Business to Business）コラボレーションは外部ユーザーをゲストとしてテナントに招待し、自社のリソースへのアクセスを制御できる。パートナーは自分の組織のアカウントでサインインするため、パスワード管理は不要。RBACで適切なスコープとロールを割り当てることで最小権限アクセスが実現できる。",trap:"自社テナントに新規アカウント作成はパスワード管理・ライフサイクル管理が必要でパートナーに認証情報を共有するのはセキュリティリスク。サービスプリンシパルのシークレット共有は機密漏洩リスク。B2CはコンシューマーID向けで企業間コラボには適さない。",cmp:[{svc:"B2B招待＋RBAC",feature:"外部アカウント活用・アクセス制御",rto:"招待承認後即時",cost:"無料（一部制限あり）",note:"✓ 推奨"},{svc:"ゲスト用アカウント作成",feature:"完全な制御",rto:"即時",cost:"ライセンス必要",note:"管理負担大"},{svc:"B2C",feature:"コンシューマーID管理",rto:"複雑な実装",cost:"利用量課金",note:"企業間B2Bには不適切"}],kws:["B2B","ゲストユーザー","外部コラボレーション","招待","RBAC","Readerロール"]},
  {domain:"ID管理",cat:"マネージドID",diff:"Medium",q:"Azure App ServiceからAzure Key Vaultにシークレットを取得したい。アプリのコードやコンフィグファイルに認証情報（クライアントIDやシークレット）を含めずに安全に認証したい。最適な方法は？",opts:["コードにサービスプリンシパルのクライアントIDとシークレットをハードコード","App ServiceのManaged Identity（マネージドID）を有効化してKey Vaultにアクセスポリシーを設定","Key VaultのアクセスキーをApp Settingsに環境変数として設定","Azure ADユーザーアカウントの認証情報をコードに埋め込む"],ans:1,why:"Managed Identity（マネージドID）はAzureリソース（App Service・VM・Functionsなど）に自動で付与されるAzure ADの認証情報で、コードや設定ファイルに機密情報を持つ必要がない。App ServiceにSystem-Assigned Managed Identityを有効化し、Key VaultのアクセスポリシーでそのIDに権限を付与すれば、コード側はAzure SDK標準のDefaultAzureCredentialで透過的に認証される。",trap:"クライアントシークレットのハードコードは機密漏洩リスクが高くコードを見た人全員が取得できてしまう。App Settingsへの平文保存もSecretではなく環境変数なので安全ではない。ユーザー認証情報の埋め込みはMFAや条件付きアクセスを回避し最悪のセキュリティ実践。",cmp:[{svc:"Managed Identity",feature:"シークレットレス認証・自動ローテーション",rto:"即時",cost:"無料",note:"✓ 推奨"},{svc:"サービスプリンシパル",feature:"細かいスコープ制御",rto:"即時",cost:"無料",note:"シークレット管理が必要"},{svc:"ハードコード",feature:"実装シンプル",rto:"即時",cost:"無料",note:"セキュリティリスク最大"}],kws:["Managed Identity","マネージドID","Key Vault","シークレットレス","DefaultAzureCredential","App Service"]},
  {domain:"ID管理",cat:"SSPR",diff:"Easy",q:"ヘルプデスクへのパスワードリセット依頼が月300件以上ある。ユーザー自身がパスワードをリセットできるようにして、ヘルプデスクの負荷を下げたい。必要なAzure AD機能は？",opts:["全ユーザーのパスワードを定期的に期限切れにする","Self-Service Password Reset（SSPR）を有効化してユーザーが自分でリセットできるようにする","ヘルプデスク担当者を増員する","Azure AD Connect でオンプレADのパスワードポリシーを同期する"],ans:1,why:"SSPR（Self-Service Password Reset）はユーザーが事前登録した認証方法（電話・メール・認証アプリ）を使って、ヘルプデスクを介さずに自分でパスワードをリセットできる機能。Azure AD P1以上またはMicrosoft 365ライセンスで有効化でき、ハイブリッド環境ではパスワードライトバック機能でオンプレADにも反映できる。",trap:"パスワード定期期限切れはリセット依頼を増やすだけ。担当者増員はコストが高く根本解決にならない。AD ConnectのパスワードポリシーはSSPRの代替にならない。",cmp:[{svc:"SSPR",feature:"ユーザーセルフサービス・ヘルプデスク負荷軽減",rto:"即時",cost:"P1以上",note:"✓ 推奨"},{svc:"担当者増員",feature:"即時対応",rto:"採用期間",cost:"人件費",note:"コスト効率悪"},{svc:"パスワード同期",feature:"ハイブリッドID統一",rto:"設定後即時",cost:"無料",note:"SSPRとは別機能"}],kws:["SSPR","Self-Service Password Reset","パスワードリセット","ヘルプデスク","パスワードライトバック"]},
  {domain:"ID管理",cat:"アクセスレビュー",diff:"Hard",q:"Azureリソースへのアクセス権を四半期ごとに棚卸しして、不要なアクセス権を定期的に削除したい。手作業ではなく自動化したい。最適なAzure AD機能は？",opts:["管理者が手動でIAMを見てアクセス権を削除","アクセスレビュー（Access Reviews）を設定して定期レビューを自動化","Azureポリシーでアクセス権の有効期限を設定","PIMのみで全ての権限を管理"],ans:1,why:"Azure AD アクセスレビュー（Access Reviews）はグループメンバーシップ・アプリケーションアクセス・ロールの割り当てを定期的にレビューする機能。四半期ごとなどの頻度でレビュアー（マネージャー・本人・管理者）に通知し、承認されなかったアクセスは自動的に削除（または無効化）できる。",trap:"手動レビューは漏れが多く規模が大きいと現実的でない。Azureポリシーはリソース構成の強制でアクセス権棚卸しの機能はない。PIMはJust-In-Time昇格で定期棚卸しとは別の機能。",cmp:[{svc:"アクセスレビュー",feature:"定期自動レビュー・自動削除",rto:"頻度設定可",cost:"P2必要",note:"✓ 推奨"},{svc:"手動レビュー",feature:"柔軟な判断",rto:"実施タイミング次第",cost:"無料",note:"抜け漏れリスク"},{svc:"PIM",feature:"Just-In-Time昇格",rto:"即時",cost:"P2必要",note:"棚卸しとは別機能"}],kws:["アクセスレビュー","Access Reviews","棚卸し","ガバナンス","自動削除","定期レビュー"]},
  {domain:"ID管理",cat:"エンタープライズアプリ",diff:"Medium",q:"社内のカスタムSaaSアプリ（OpenID Connect対応）をAzure ADで認証したい。ユーザーはMyAppsポータルからSSOでアクセスできるようにしたい。最適な構成は？",opts:["アプリにAzure ADのB2Cを設定","Azure ADにアプリを「エンタープライズアプリケーション」として登録してOIDCのSSO設定を行う","Azureポータルのアクセス制御（IAM）でアプリにロールを付与","Azure API ManagementでOAuthを設定"],ans:1,why:"Azure ADのエンタープライズアプリケーション（Enterprise Application）はOIDC・SAML・パスワードSSOに対応するアプリをAzure ADと統合できる。アプリ登録後はユーザー・グループの割り当て、MyAppsポータルへの表示、条件付きアクセスポリシーの適用が可能。OpenID Connect対応アプリにはOIDC SSOの設定が最適。",trap:"B2CはコンシューマーID向けで社内SSOには適さない。IAMのロール付与はAzureリソースのRBACでアプリ認証とは別。API ManagementはAPIゲートウェイでSSOの実装場所が異なる。",cmp:[{svc:"エンタープライズアプリ（OIDC）",feature:"SSO・MyApps・条件付きアクセス対応",rto:"設定後即時",cost:"無料（一部P1）",note:"✓ 推奨"},{svc:"B2C",feature:"コンシューマーID管理",rto:"複雑な実装",cost:"利用量課金",note:"社内SSOには不適切"},{svc:"API Management",feature:"APIゲートウェイ・OAuth",rto:"実装複雑",cost:"高",note:"SSOの主目的外"}],kws:["エンタープライズアプリ","Enterprise Application","SSO","OIDC","MyApps","シングルサインオン"]},
  {domain:"ID管理",cat:"Identity Protection",diff:"Hard",q:"Azure AD Identity Protectionを使い、リスクが検出されたサインインに対して自動的にMFAを要求したい。リスクが高いユーザーには自動でパスワードリセットを要求したい。最適な設定は？",opts:["管理者が手動でリスクレポートを確認して対応","Identity Protectionのサインインリスクポリシー（MFA要求）とユーザーリスクポリシー（パスワード変更要求）を有効化","条件付きアクセスでIPアドレスをブロック","Azure Sentinelでアラートを設定"],ans:1,why:"Azure AD Identity Protectionはリスク検出（不審なサインイン・漏洩した資格情報・匿名IPなど）に基づいて自動的な対応ポリシーを設定できる。サインインリスクポリシーは中〜高リスクのサインインにMFAを要求し、ユーザーリスクポリシーは高リスクユーザーにSSPRでのパスワード変更を要求する。これらはAzure AD P2が必要。",trap:"手動対応はリアルタイムの脅威への対応が遅い。IPブロックは特定の攻撃パターンにのみ有効でAIベースのリスク検出の代替にならない。Sentinelはセキュリティ情報イベント管理（SIEM）で自動ポリシー強制とは別。",cmp:[{svc:"Identity Protection",feature:"AIリスク検出・自動ポリシー強制",rto:"リアルタイム",cost:"P2必要",note:"✓ 推奨"},{svc:"条件付きアクセス（IPブロック）",feature:"静的IP制御",rto:"即時",cost:"P1以上",note:"動的リスクには不対応"},{svc:"手動対応",feature:"柔軟な判断",rto:"遅延あり",cost:"無料",note:"リアルタイム対応不可"}],kws:["Identity Protection","サインインリスク","ユーザーリスク","P2","リスクポリシー","自動対応"]},
  {domain:"ID管理",cat:"Azure AD Connect",diff:"Medium",q:"オンプレミスのActive DirectoryユーザーをAzure ADに同期して、オンプレとAzureの両方で同じ認証情報を使えるようにしたい。クラウド側でパスワードを変更した場合にオンプレにも即座に反映させたい。最適な構成は？",opts:["手動でAzure ADにユーザーをCSVインポート","Azure AD Connectでパスワードハッシュ同期（PHS）のみを有効化","Azure AD ConnectでPassthrough Authentication（PTA）とパスワードライトバックを有効化","Azure AD ConnectでPHSとパスワードライトバックを有効化"],ans:3,why:"パスワードライトバックはAzure AD（またはSSPR）でパスワードを変更した際にオンプレミスADに即座に書き戻す機能。パスワードハッシュ同期（PHS）はオンプレのパスワードハッシュをAzureに同期する方式で、ライトバックと組み合わせることでクラウドでの変更がオンプレにも反映される。PTAはオンプレで直接認証する方式でライトバックは不要だが、クラウドのSSPRと組み合わせるにはPHSの方が一般的。",trap:"CSVインポートは同期機能がなく手動管理が必要。PHSのみではクラウドで変更したパスワードがオンプレに反映されない。PTAはオンプレで認証するためクラウドのパスワード変更をオンプレに書き戻す機能として別途ライトバックが必要。",cmp:[{svc:"PHS＋パスワードライトバック",feature:"ハッシュ同期＋双方向パスワード",rto:"即時同期",cost:"無料",note:"✓ 推奨"},{svc:"PTA",feature:"オンプレ認証",rto:"オンプレ依存",cost:"無料",note:"可用性がオンプレに依存"},{svc:"フェデレーション（ADFS）",feature:"完全なオンプレ認証",rto:"ADFS可用性依存",cost:"インフラコスト",note:"複雑・保守コスト高"}],kws:["Azure AD Connect","パスワードライトバック","PHS","パスワードハッシュ同期","ハイブリッドID","SSPR"]},
  {domain:"ID管理",cat:"管理単位",diff:"Hard",q:"大企業で複数の部門ごとに異なる管理者が自部門のユーザーのみを管理できるようにしたい。部門Aの管理者が部門Bのユーザーを変更できないようにしたい。最適なAzure AD機能は？",opts:["全管理者にグローバル管理者ロールを付与","管理単位（Administrative Units）を部門ごとに作成し、部門の管理者に限定スコープのロールを付与","リソースグループを部門ごとに作成してRBACを設定","サブスクリプションを部門ごとに分ける"],ans:1,why:"管理単位（Administrative Units）はAzure ADテナント内でユーザー・グループ・デバイスのサブセットを管理するための組織単位。部門ごとに管理単位を作成して該当ユーザーを所属させ、部門の管理者に「ユーザー管理者（スコープ：管理単位）」ロールを付与することで、自部門のユーザーのみ管理可能にできる。",trap:"グローバル管理者は全テナントに対する最高権限でスコープ分離ができない。リソースグループのRBACはAzureリソースのアクセス制御でAD管理の委任ではない。サブスクリプション分割は大きな管理オーバーヘッドがかかる。",cmp:[{svc:"管理単位",feature:"AD管理の委任・スコープ限定",rto:"即時",cost:"P1必要",note:"✓ 推奨"},{svc:"グローバル管理者",feature:"全権限",rto:"即時",cost:"無料",note:"スコープ分離不可"},{svc:"サブスクリプション分割",feature:"課金・リソース分離",rto:"移行コスト大",cost:"管理オーバーヘッド",note:"AD管理委任には不適切"}],kws:["管理単位","Administrative Units","委任管理","スコープ","部門管理","ユーザー管理者"]},
  {domain:"ID管理",cat:"ライセンス管理",diff:"Easy",q:"新入社員100名分のAzure AD P2ライセンスを効率的に割り当てたい。全員が同じ部門グループに所属している。最も効率的な方法は？",opts:["100人分を1人ずつポータルで手動割り当て","PowerShellスクリプトで一括割り当て","グループベースのライセンス割り当て（Group-based licensing）で部門グループにライセンスを割り当て","Azure ADのCSVインポートでライセンスを設定"],ans:2,why:"グループベースライセンス割り当てはAzure ADグループにライセンスを割り当てることで、グループメンバー全員に自動的にライセンスが付与される。新入社員がグループに追加されると自動でライセンスが割り当てられ、退職でグループから削除されると自動で解放される。スケールが大きくなっても管理コストがほぼゼロ。",trap:"1人ずつ手動割り当ては100人では非現実的で管理ミスの温床。PowerShellは一括実行できるが入退社の都度スクリプト実行が必要。CSVインポートはユーザー作成・プロパティ設定で直接のライセンス管理機能ではない。",cmp:[{svc:"グループベースライセンス",feature:"自動割り当て・解放・スケーラブル",rto:"即時",cost:"P1以上必要",note:"✓ 推奨"},{svc:"手動割り当て",feature:"個別制御",rto:"即時（1件ずつ）",cost:"無料",note:"100人では非現実的"},{svc:"PowerShell",feature:"一括実行・自動化",rto:"スクリプト作成後",cost:"無料",note:"入退社都度実行が必要"}],kws:["グループベースライセンス","Group-based licensing","ライセンス管理","自動割り当て","Azure AD P2"]},
  {domain:"ID管理",cat:"デバイス管理",diff:"Medium",q:"従業員の個人所有デバイス（BYOD）からのAzure ADサインインを許可したいが、デバイスがコンプライアンスポリシーを満たしている場合のみアクセスを許可したい。最適な構成は？",opts:["全デバイスからのアクセスを無条件で許可","Azure AD登録（Registered）＋Intuneコンプライアンスポリシー＋条件付きアクセスでデバイスコンプライアンスを要求","全BYODデバイスをブロック","デバイスごとに手動でホワイトリストを作成"],ans:1,why:"BYOD対応の標準構成はAzure AD登録（Registered）でデバイスをテナントに紐づけ、Microsoft IntuneのコンプライアンスポリシーでOS更新・暗号化・パスコードなどの要件を定義し、条件付きアクセスポリシーで「デバイスコンプライアンス準拠」を条件にアクセスを許可する。非準拠デバイスは自動的にブロックされる。",trap:"無条件許可は未管理デバイスからの危険なアクセスを許す。全BYODブロックはユーザーの利便性を大幅に下げ業務効率化の阻害になる。手動ホワイトリストはスケールしないし管理が煩雑。",cmp:[{svc:"AD登録＋Intune＋条件付きアクセス",feature:"コンプライアンス準拠デバイスのみ許可",rto:"設定後即時",cost:"Intuneライセンス必要",note:"✓ 推奨"},{svc:"全許可",feature:"シンプル",rto:"即時",cost:"無料",note:"セキュリティリスク大"},{svc:"全ブロック",feature:"最高セキュリティ",rto:"即時",cost:"無料",note:"業務阻害"}],kws:["BYOD","Azure AD Registered","Intune","コンプライアンスポリシー","条件付きアクセス","デバイスコンプライアンス"]},
  {domain:"ID管理",cat:"テナント管理",diff:"Hard",q:"Azure ADテナントのセキュリティレポートを確認したところ、多数のレガシー認証（SMTP・POP3・IMAP・古いOfficeクライアント）によるサインインが検出された。これらをブロックしたい。最適な方法は？",opts:["ユーザーのパスワードを強制リセット","条件付きアクセスポリシーで「クライアントアプリ：レガシー認証クライアント」を条件にブロックポリシーを作成","全ユーザーのメールアクセスを無効化","MFAを全員に強制するだけで十分"],ans:1,why:"レガシー認証プロトコル（SMTP AUTH・POP3・IMAP・古いExchange ActiveSyncなど）はMFAをサポートしないため、条件付きアクセスのMFA要求をバイパスされる可能性がある。条件付きアクセスポリシーのクライアントアプリ条件で「レガシー認証クライアント」を選択しブロックアクションを設定することで一括でブロックできる。",trap:"パスワードリセットはレガシー認証の問題に対処できない（プロトコル自体がMFA非対応）。メールアクセス全無効は業務への影響が大きすぎる。MFAだけではレガシー認証プロトコルがMFAをバイパスするため効果がない。",cmp:[{svc:"条件付きアクセス（レガシーブロック）",feature:"プロトコルレベルのブロック",rto:"即時",cost:"P1以上",note:"✓ 推奨"},{svc:"MFA強制",feature:"認証強化",rto:"即時",cost:"P1以上",note:"レガシー認証には効果なし"},{svc:"メール全無効",feature:"確実なブロック",rto:"即時",cost:"無料",note:"業務影響大"}],kws:["レガシー認証","Legacy Authentication","条件付きアクセス","ブロック","SMTP","POP3","IMAP"]},

  // ── ネットワーク 追加分 ──
  {domain:"ネットワーク",cat:"VNet",diff:"Easy",q:"Azure Virtual Network（VNet）を新規作成した。同じVNet内の2つのサブネット（Subnet-A と Subnet-B）間の通信について正しい説明はどれか？",opts:["デフォルトでは同一VNet内のサブネット間通信はブロックされる","デフォルトで同一VNet内のサブネット間はルーティングが自動的に有効になっており通信できる","NSGを設定しないと通信できない","VNet Peeringを別途設定する必要がある"],ans:1,why:"同一VNet内のサブネット間はAzureが自動的にシステムルートを提供するため、追加設定なしで通信できる。NSGを適用することでサブネット間トラフィックを制御（許可・拒否）できるが、デフォルトのNSGルールでは同一VNet内の通信は許可されている（AllowVnetInBound）。",trap:"VNet Peeringは異なるVNet間の接続に使用するもので同一VNet内のサブネット間には不要。NSGはデフォルトで同一VNet内の通信を許可している（明示的なDenyルールがなければ通信可能）。",cmp:[{svc:"同一VNet内通信",feature:"自動ルーティング・デフォルト許可",rto:"即時",cost:"無料",note:"✓ デフォルト動作"},{svc:"NSGで制御",feature:"L4レベルの許可・拒否",rto:"即時",cost:"無料",note:"必要に応じて追加"},{svc:"VNet Peering",feature:"異なるVNet間接続",rto:"設定後即時",cost:"転送データ量",note:"同一VNetには不要"}],kws:["VNet","サブネット","システムルート","NSG","AllowVnetInBound","デフォルト通信"]},
  {domain:"ネットワーク",cat:"VNet",diff:"Medium",q:"同じAzureリージョン内にある2つのVNet（VNet-A: 10.1.0.0/16、VNet-B: 10.2.0.0/16）をピアリングしようとしたが失敗した。原因として最も可能性が高いのは？",opts:["VNet Peeringは同一リージョンでは使用できない","VNetのアドレス空間が重複していた（例: 両方10.1.0.0/16）","VNet PeeringにはVPN Gatewayが必要","サブスクリプションが異なると使用できない"],ans:1,why:"VNet Peeringの要件の一つは、ピアリングする2つのVNetのアドレス空間（CIDRブロック）が重複していないこと。10.1.0.0/16と10.2.0.0/16は重複がないのでピアリング可能だが、10.1.0.0/16同士など重複するアドレス空間はピアリングできない。問題文では失敗しているので重複が原因。",trap:"VNet Peeringは同一リージョン（ローカルピアリング）でも異なるリージョン（グローバルピアリング）でも使用できる。VPN Gatewayは不要。サブスクリプションをまたいだピアリングも可能（ただし権限が必要）。",cmp:[{svc:"VNet Peering",feature:"バックボーン接続・低レイテンシー",rto:"設定後即時",cost:"転送データ量",note:"アドレス空間重複不可"},{svc:"VPN Gateway",feature:"暗号化トンネル・オンプレ接続",rto:"接続確立まで数分",cost:"ゲートウェイ料金",note:"Peeringより高コスト"},{svc:"Azure Virtual WAN",feature:"大規模なハブアンドスポーク",rto:"設定複雑",cost:"高",note:"大規模向け"}],kws:["VNet Peering","アドレス空間","CIDR","重複","ピアリング失敗","グローバルピアリング"]},
  {domain:"ネットワーク",cat:"NSG",diff:"Medium",q:"Azure VMに接続されたNSGで、インターネットからポート22（SSH）へのインバウンドアクセスを特定のIPアドレス（203.0.113.10）のみに制限したい。NSGルールをどう設定するか？",opts:["優先度100：ソース=203.0.113.10、ポート=22、アクション=Allow のみ追加","優先度100：ソース=203.0.113.10、ポート=22、アクション=Allow を追加し、優先度200：ソース=Any、ポート=22、アクション=Deny を追加","デフォルトルールのみで設定不要","ポート22を全許可して、ファイアウォールで制限する"],ans:1,why:"NSGルールは優先度の低い数値が先に評価される。AllowルールとDenyルールを組み合わせる場合、特定IPを許可（優先度100）し、その後全IPをDeny（優先度200）することで、203.0.113.10からのSSHのみ許可できる。ただしデフォルトでインターネットからのインバウンドはDenyAllInBound（優先度65500）があるため、Allowルールのみ追加でも効果はある。明示的なDenyルールはより確実。",trap:"AllowルールのみではデフォルトのDenyAllInBound（65500）で他IPはブロックされるが、明示的なDenyルールを追加する方がセキュリティポリシーとして明確。デフォルトルールのみでは特定IPへの許可設定ができない。",cmp:[{svc:"Allow+明示的Deny",feature:"明確なホワイトリスト",rto:"即時",cost:"無料",note:"✓ 推奨（明確）"},{svc:"Allowのみ",feature:"デフォルトDeny頼り",rto:"即時",cost:"無料",note:"動作するが意図が不明確"},{svc:"全許可+Firewall",feature:"深い防御",rto:"即時",cost:"Firewall料金",note:"NSGで十分な場合は過剰"}],kws:["NSG","インバウンドルール","優先度","IP制限","SSH","Allow","Deny"]},
  {domain:"ネットワーク",cat:"NSG",diff:"Hard",q:"NSGをサブネットとNIC（ネットワークインターフェース）の両方に適用した場合、トラフィックはどのように評価されるか？",opts:["サブネットのNSGのみが評価される","NICのNSGのみが評価される","インバウンドはサブネットNSG→NIC NSGの順、アウトバウンドはNIC NSG→サブネットNSGの順で両方評価される","NSGは1か所にしか適用できない"],ans:2,why:"NSGをサブネットとNICの両方に適用した場合、インバウンドトラフィックはまずサブネットのNSGが評価され、通過したらNICのNSGが評価される。アウトバウンドはNICのNSGが先に評価され、次にサブネットのNSGが評価される。両方のNSGで許可されなければトラフィックはブロックされる（AND条件）。",trap:"どちらか一方のNSGのみが評価されるわけではなく、両方が評価される。NSGはサブネットとNIC両方に適用可能。",cmp:[{svc:"サブネットNSG",feature:"サブネット全体へのポリシー",rto:"即時",cost:"無料",note:"最初に評価（インバウンド）"},{svc:"NIC NSG",feature:"個別VMへのポリシー",rto:"即時",cost:"無料",note:"2番目に評価（インバウンド）"},{svc:"両方適用",feature:"多層防御",rto:"即時",cost:"無料",note:"両方ANDで通過が必要"}],kws:["NSG","サブネット","NIC","評価順序","インバウンド","アウトバウンド","多層防御"]},
  {domain:"ネットワーク",cat:"Azure Firewall",diff:"Hard",q:"ハブアンドスポーク構成のAzureネットワークで、すべてのスポークVNetからインターネットへのアウトバウンドトラフィックを一元的に検査・フィルタリングしたい。FQDNベースのフィルタリングも必要。最適なサービスは？",opts:["各スポークVNetにNSGを設定","ハブVNetにAzure Firewallをデプロイし、スポークVNetからのデフォルトルートをFirewallに向ける（UDR）","各スポークVNetにNATゲートウェイを設定","スポークVNetにAzure Bastionを設定"],ans:1,why:"Azure FirewallはL3-L7のステートフルファイアウォールで、FQDNベースのアプリケーションルール・IPフィルタリングのネットワークルール・DNAT（インバウンドNAT）をサポートする。ハブVNetにデプロイしてUser Defined Route（UDR）でスポークVNetの0.0.0.0/0をFirewallのプライベートIPに向けることで、全アウトバウンドを一元検査できる。",trap:"NSGはFQDNフィルタリングができない（IPアドレスベースのみL4）。NATゲートウェイはアウトバウンドNATで検査・フィルタリング機能はない。Bastionは管理用のRDP/SSH安全接続でアウトバウンドフィルタリングではない。",cmp:[{svc:"Azure Firewall",feature:"L7・FQDN・ステートフル・一元管理",rto:"即時",cost:"高（固定+データ）",note:"✓ 推奨"},{svc:"NSG",feature:"L4・IPベース",rto:"即時",cost:"無料",note:"FQDNフィルタリング不可"},{svc:"NATゲートウェイ",feature:"アウトバウンドNAT",rto:"即時",cost:"中",note:"検査機能なし"}],kws:["Azure Firewall","ハブアンドスポーク","UDR","FQDN","アウトバウンドフィルタリング","ステートフル"]},
  {domain:"ネットワーク",cat:"ロードバランサー",diff:"Medium",q:"内部（プライベート）ネットワーク向けのL4ロードバランサーが必要。Azureの同一リージョン内にある複数のVMにTCPトラフィックを分散し、バックエンドVMのヘルスチェックも行いたい。パブリックIPは不要。最適なサービスは？",opts:["Azure Application Gateway（内部モード）","Azure Internal Load Balancer（Standard）","Azure Traffic Manager","Azure Front Door（内部モード）"],ans:1,why:"Azure Internal Load Balancer（Standard）はプライベートフロントエンドIPを持つL4（TCP/UDP）ロードバランサーで、同一VNet内またはピアリングVNetのバックエンドVMにトラフィックを分散する。ヘルスプローブでバックエンドの可用性を確認し、障害VMには自動でトラフィックを送らない。",trap:"Application GatewayはL7でHTTP/HTTPSに特化しており、TCPの汎用L4分散にはオーバースペック。Traffic ManagerはDNSベースのグローバル負荷分散でリージョン内のL4分散には使えない。Front Doorはグローバルなエッジサービスで内部通信向けではない。",cmp:[{svc:"Internal Load Balancer",feature:"L4・プライベートIP・ヘルスプローブ",rto:"低レイテンシー",cost:"低",note:"✓ 推奨"},{svc:"Application Gateway（内部）",feature:"L7・HTTP特化",rto:"起動に数分",cost:"中",note:"L4汎用分散にはオーバースペック"},{svc:"Traffic Manager",feature:"グローバルDNS分散",rto:"DNS TTL依存",cost:"低",note:"リージョン内L4には不適切"}],kws:["Internal Load Balancer","L4","プライベートIP","ヘルスプローブ","TCP","内部分散"]},
  {domain:"ネットワーク",cat:"VPN",diff:"Medium",q:"オンプレミスのネットワーク（192.168.0.0/16）とAzure VNet（10.0.0.0/16）をサイト間VPN（S2S VPN）で接続したい。オンプレのVPNデバイスのパブリックIPは固定IPではなくDHCPで動的に割り当てられている。どう対応すべきか？",opts:["動的IPではサイト間VPNは構成できないため固定IPに変更する","Azure VPN GatewayでBGP（Border Gateway Protocol）を有効化して動的ルーティングで対応","オンプレ側でNATを使ってプライベートIPに変換する","ExpressRouteに変更する"],ans:1,why:"BGP（Border Gateway Protocol）を使用するとVPN Gatewayとオンプレデバイス間でルート情報を動的に交換できる。BGP接続ではIPアドレスの変化にも対応しやすく、またフェイルオーバーや複数接続の管理が容易になる。ただし動的IPのS2S VPN接続をAzure側で受け付けるにはオンプレデバイスがBGPをサポートしている必要がある。",trap:"固定IPへの変更は現実的でない場合がある（ISP依存）。NAT変換はIPsecとの相性問題がある。ExpressRouteは専用線接続で動的IP問題の解決策ではない。",cmp:[{svc:"BGP対応S2S VPN",feature:"動的ルーティング・冗長接続対応",rto:"接続確立後即時",cost:"VPN Gateway料金",note:"✓ 推奨"},{svc:"静的ルーティングS2S VPN",feature:"シンプルな設定",rto:"接続確立後即時",cost:"VPN Gateway料金",note:"固定IP必要"},{svc:"ExpressRoute",feature:"専用・高帯域・低レイテンシー",rto:"回線開通に時間",cost:"最高",note:"動的IP問題の解決策でない"}],kws:["サイト間VPN","S2S VPN","BGP","動的ルーティング","VPN Gateway","動的IP"]},
  {domain:"ネットワーク",cat:"VPN",diff:"Hard",q:"リモートワーカーが自宅からAzure VNetのリソースに安全に接続する必要がある。接続するユーザー数は最大500人。Azure AD認証を使用してVPN接続したい。最適なソリューションは？",opts:["各ユーザーにサイト間VPNを設定","Azure VPN GatewayのPoint-to-Site VPN（P2S）＋Azure AD認証を構成","Azure Bastionで全員がブラウザ経由でアクセス","ExpressRouteを500本用意"],ans:1,why:"Point-to-Site VPN（P2S）はクライアントデバイスからVNetへの個別VPN接続で、Azure AD認証と組み合わせることでMFA・条件付きアクセスも適用できる。OpenVPNプロトコルを使用した場合にAzure AD認証が利用可能。最大で数千のP2S接続をサポートする（ゲートウェイSKUに依存）。",trap:"サイト間VPNはオフィスや拠点のネットワーク単位の接続でリモート個人には適さない。Azure Bastionはブラウザ経由のRDP/SSHで汎用のVPN接続ではない。ExpressRouteは専用線で個人リモート接続には不適切。",cmp:[{svc:"P2S VPN＋Azure AD認証",feature:"個人接続・MFA・条件付きアクセス",rto:"クライアント設定後即時",cost:"GW料金+接続数",note:"✓ 推奨"},{svc:"S2S VPN",feature:"拠点間接続",rto:"接続確立まで数分",cost:"GW料金",note:"個人接続には不適"},{svc:"Azure Bastion",feature:"ブラウザRDP/SSH",rto:"即時",cost:"中",note:"汎用VPNではない"}],kws:["Point-to-Site","P2S VPN","Azure AD認証","リモートワーク","OpenVPN","MFA"]},
  {domain:"ネットワーク",cat:"DNS",diff:"Medium",q:"Azure VNet内のVMにカスタムDNS名（例: myapp.internal.corp）で名前解決させたい。パブリックDNSを使わず、VNet内部だけで有効なプライベートDNSゾーンを構成したい。最適な方法は？",opts:["Azure Public DNS Zoneを作成してAレコードを追加","Azure Private DNS Zoneを作成してVNetにリンクし自動登録を有効化","VMごとにhostsファイルを手動編集","オンプレミスのDNSサーバーをAzure VMに展開"],ans:1,why:"Azure Private DNS ZoneはVNet内部でのみ有効なプライベートなDNSゾーン。VNetにリンクして自動登録（Auto Registration）を有効にするとVMのプライベートIPが自動的にAレコードとして登録される。VNet内のVMはAzure提供のDNS（168.63.129.16）経由でPrivate DNS Zoneを自動的に参照する。",trap:"Public DNS Zoneはインターネット公開のDNSでプライベートな名前解決には使えない（名前がインターネット上に公開される）。hostsファイルの手動編集はVM台数が増えると管理できない。オンプレDNSのVM展開は管理負担が大きくAzure管理の利点がない。",cmp:[{svc:"Private DNS Zone",feature:"VNet内部名前解決・自動登録",rto:"即時",cost:"ゾーン+クエリ数",note:"✓ 推奨"},{svc:"Public DNS Zone",feature:"インターネット公開DNS",rto:"TTL伝播",cost:"ゾーン+クエリ数",note:"プライベートには不適"},{svc:"カスタムDNSサーバー（VM）",feature:"完全な制御",rto:"VM起動後",cost:"VM料金",note:"管理負担大"}],kws:["Private DNS Zone","VNetリンク","自動登録","プライベートDNS","名前解決","168.63.129.16"]},
  {domain:"ネットワーク",cat:"DNS",diff:"Hard",q:"Azure VMからインターネット上のFQDN（例: api.example.com）にアクセスしようとするとタイムアウトする。VNetのDNS設定はデフォルト（Azure提供DNS）のまま。NSGでのアウトバウンドはポート443を許可済み。考えられる原因と確認方法は？",opts:["Azure提供DNSはインターネット名前解決をサポートしないため、カスタムDNSサーバーが必要","NSGのアウトバウンドルールでポート53（DNS）がブロックされているか確認し、Azure DNSへの問い合わせを確認","VNetのアドレス空間が不足している","Azure DNS Private Resolverを設定していないため"],ans:1,why:"Azure提供DNS（168.63.129.16）はVNet内のプライベートDNSとインターネット公開DNSの両方を解決できる。タイムアウトの原因としてNSGでUDP/TCP 53がブロックされている可能性がある。nslookupやdigコマンドで名前解決をテストし、Network WatcherのNSG診断で確認できる。",trap:"Azure提供DNSはインターネット名前解決もサポートするためカスタムDNSは不要（問題の原因ではない）。VNetのアドレス空間はDNS解決とは無関係。DNS Private Resolverはハイブリッド環境のDNS転送向けでこのケースでは不要。",cmp:[{svc:"NSGのポート53確認",feature:"DNSトラフィックの確認",rto:"診断即時",cost:"無料",note:"✓ まず確認"},{svc:"Network Watcher NSG診断",feature:"トラフィック診断",rto:"即時",cost:"無料",note:"原因特定に有効"},{svc:"DNS Private Resolver",feature:"ハイブリッドDNS転送",rto:"設定後",cost:"有料",note:"このケースには不要"}],kws:["Azure DNS","ポート53","NSG","名前解決","タイムアウト","Network Watcher","トラブルシューティング"]},
  {domain:"ネットワーク",cat:"NATゲートウェイ",diff:"Medium",q:"プライベートサブネット内の複数のVMがインターネットにアクセスする必要がある。VMにパブリックIPを付与せず、固定のアウトバウンドパブリックIPアドレスから接続させたい（外部サービスのIPホワイトリストに登録するため）。最適なサービスは？",opts:["各VMにパブリックIPを割り当てる","Azure NAT Gatewayをサブネットに関連付け、静的パブリックIPまたはパブリックIPプレフィックスを割り当て","Azure Load BalancerのアウトバウンドルールでSNATを使用","Azure Firewallをデプロイしてアウトバウンドを許可"],ans:1,why:"Azure NAT Gatewayはサブネット全体のアウトバウンドインターネット接続を統一したパブリックIPアドレスから行う。静的パブリックIPまたはIPプレフィックスをNAT Gatewayに関連付けることで、サブネット内の全VMが同じIPアドレスからインターネットにアクセスできる。VMへのパブリックIP割り当て不要でセキュアなアーキテクチャを実現。",trap:"VMへの個別パブリックIP割り当ては管理が複雑でセキュリティリスクも高い。Load BalancerのSNATはエラー（SNAT枯渇）が発生しやすくIPが固定されない。Firewallはアウトバウンドフィルタリングも提供するがコストが高い（固定IP目的のみならNAT Gatewayが適切）。",cmp:[{svc:"NAT Gateway",feature:"固定IP・SNAT・スケーラブル",rto:"即時",cost:"中",note:"✓ 推奨"},{svc:"LB アウトバウンドSNAT",feature:"LBと統合",rto:"即時",cost:"低",note:"SNAT枯渇リスク"},{svc:"Azure Firewall",feature:"フィルタリング＋NAT",rto:"即時",cost:"高",note:"固定IP目的のみなら過剰"}],kws:["NAT Gateway","SNAT","固定IP","アウトバウンド","パブリックIPプレフィックス","プライベートサブネット"]},
  {domain:"ネットワーク",cat:"Azure Bastion",diff:"Easy",q:"Azure VM（WindowsとLinux）に対してRDPやSSH接続する際、VMにパブリックIPを付与せずかつVPNも使わずに、セキュアにブラウザから管理したい。最適なサービスは？",opts:["VMにパブリックIPを付与してインターネット経由でRDP/SSH","Azure BastionをVNetにデプロイしてポータルのブラウザからRDP/SSH接続","Azure Firewallでポート3389・22のみインターネットから許可","P2S VPNを設定して接続"],ans:1,why:"Azure BastionはVNetにデプロイするPaaS型の踏み台サービスで、AzureポータルのブラウザからRDP（Windows）やSSH（Linux）接続できる。VMにパブリックIPは不要で、NSGでインターネットからのポート3389・22をブロックした状態でも接続できる。通信はAzureのHTTPS（443）経由で暗号化される。",trap:"パブリックIPを付与してのRDPはポート3389が攻撃対象になりやすい。Firewallでポートを許可してもインターネット公開リスクは変わらない。P2S VPNはクライアントソフトウェアのインストールが必要でブラウザだけでの接続より手順が多い。",cmp:[{svc:"Azure Bastion",feature:"ブラウザRDP/SSH・VMパブリックIP不要",rto:"即時",cost:"中（Bastion料金）",note:"✓ 推奨"},{svc:"パブリックIP＋RDP",feature:"シンプル",rto:"即時",cost:"パブリックIP料金",note:"セキュリティリスク大"},{svc:"P2S VPN",feature:"汎用VPN接続",rto:"クライアント設定後",cost:"GW料金",note:"ブラウザのみは不可"}],kws:["Azure Bastion","踏み台","RDP","SSH","パブリックIP不要","ブラウザ","管理接続"]},
  {domain:"ネットワーク",cat:"ロードバランサー",diff:"Hard",q:"グローバルに展開されたWebサービスで、ユーザーを地理的に最も近いAzureリージョンのバックエンドに誘導し、特定リージョンに障害が発生した場合は自動的に別リージョンにフェイルオーバーさせたい。最適なサービスは？",opts:["各リージョンにAzure Application Gatewayをデプロイして手動切り替え","Azure Traffic Managerを使用して地理ルーティングと優先度ルーティングを組み合わせる","Azure Front Doorを使用してグローバルな負荷分散とフェイルオーバーを構成","Azure Standard Load Balancerをグローバルに展開"],ans:2,why:"Azure Front Doorはグローバルなエッジネットワーク（Anycast）を活用して最近接PoP（Point of Presence）にトラフィックをルーティングし、バックエンドのヘルスプローブで障害を検知して自動フェイルオーバーを行う。Traffic Managerと比べてL7（HTTP/HTTPS）での最適化・WAF統合・キャッシュ・SSL終端がエッジで行われるため低レイテンシー。",trap:"Application Gatewayはリージョン単位のL7 LBでグローバルルーティングはできない。Traffic ManagerはDNSベースのグローバル分散で機能するがL4のみ、TTL依存のフェイルオーバー遅延がある。Standard Load Balancerはリージョン内のL4 LBでグローバル分散は別製品が必要。",cmp:[{svc:"Azure Front Door",feature:"グローバルエッジ・L7・WAF・自動FO",rto:"秒単位のFO",cost:"高",note:"✓ 推奨"},{svc:"Traffic Manager",feature:"グローバルDNS分散・L4",rto:"TTL依存FO（分単位）",cost:"低",note:"L7最適化なし"},{svc:"Application Gateway",feature:"リージョン内L7",rto:"即時",cost:"中",note:"グローバル分散不可"}],kws:["Azure Front Door","グローバル負荷分散","フェイルオーバー","Anycast","WAF","Traffic Manager","エッジ"]},
  {domain:"ネットワーク",cat:"UDR",diff:"Hard",q:"スポークVNet内のVMからインターネットへのすべてのトラフィックをハブVNetのAzure Firewallを通過させたい。スポークVNetのデフォルトゲートウェイを変更するために使用するAzure機能は？",opts:["VNet Peeringの設定を変更する","Network Security Groupで0.0.0.0/0をFirewallに向けるルールを追加","ユーザー定義ルート（UDR）を作成してスポークサブネットに関連付け、0.0.0.0/0のネクストホップをFirewallのプライベートIPに設定","Azure Route Serverを使用してBGPでルートを配信"],ans:2,why:"UDR（User Defined Route、カスタムルートテーブル）はAzureのシステムルートを上書きするためのルートテーブル。スポークVNetのサブネットに関連付けてデフォルトルート（0.0.0.0/0）のネクストホップをAzure FirewallのプライベートIPに設定することで、インターネット向けトラフィックをすべてFirewall経由にできる。",trap:"VNet Peeringの設定ではトラフィックのルーティングパスを変更できない。NSGはL4フィルタリングでルーティングの変更はできない。Route ServerはBGPでオンプレやNVAとルートを交換するサービスで、UDRの代替としてのルート配信には使えるが、このシンプルなケースではUDRで十分。",cmp:[{svc:"UDR（カスタムルートテーブル）",feature:"システムルート上書き・Firewall経由",rto:"即時",cost:"無料",note:"✓ 推奨"},{svc:"Route Server",feature:"BGPルート配信・NVA連携",rto:"設定後",cost:"中",note:"複雑な環境向け"},{svc:"NSG",feature:"L4フィルタリング",rto:"即時",cost:"無料",note:"ルーティング変更は不可"}],kws:["UDR","ユーザー定義ルート","ルートテーブル","デフォルトルート","Azure Firewall","ネクストホップ","ハブアンドスポーク"]},
  {domain:"ネットワーク",cat:"Network Watcher",diff:"Medium",q:"Azure VM間のネットワーク接続に問題が発生した。特定のVMからポート443で別のVMに通信できるかどうかをその場で確認したい。NSGルールの問題なのかルーティングの問題なのかも判断したい。最適なツールは？",opts:["VMにログインしてtelnetで手動テスト","Azure Network WatcherのIP Flow Verify（IPフロー確認）とConnection Troubleshoot（接続のトラブルシューティング）を使用","Azure MonitorでネットワークメトリクスをAzureポータルで確認","VNetを削除して再作成する"],ans:1,why:"Network WatcherのIP Flow Verifyは特定のVM・ポート・プロトコル・方向に対してNSGルールの評価結果（許可/拒否）とそのルール名を返す。Connection TroubleshootはVM間のTCP接続を検証し、NSG・ルーティング・ファイアウォールの問題を診断する。ポータルから数秒で診断できる。",trap:"手動telnetテストはNSGの診断情報が得られずルートの問題か見分けられない。Azure MonitorメトリクスはスループットやエラーカウントでNSGルール診断には使えない。VNetの再作成は問題の解決にならない（根本原因が不明のまま）。",cmp:[{svc:"IP Flow Verify",feature:"NSGルール評価診断",rto:"即時",cost:"無料",note:"✓ NSG問題の特定に最適"},{svc:"Connection Troubleshoot",feature:"E2E接続診断",rto:"数秒",cost:"無料",note:"✓ ルーティング問題も診断"},{svc:"手動テスト",feature:"実際の通信確認",rto:"即時",cost:"無料",note:"NSG診断情報なし"}],kws:["Network Watcher","IP Flow Verify","Connection Troubleshoot","NSG診断","ネットワークトラブルシューティング","接続確認"]},
  {domain:"ネットワーク",cat:"Private Endpoint",diff:"Hard",q:"Azure Storage AccountへのアクセスをVNet内のプライベートIPからのみ許可し、インターネットからのアクセスは完全にブロックしたい。VNet外のオンプレミスからもプライベートに接続したい。最適な構成は？",opts:["ストレージアカウントのファイアウォールで特定のパブリックIPのみ許可","ストレージアカウントにPrivate Endpointを作成しパブリックアクセスを無効化。Azure Private DNS ZoneでFQDN解決を設定。ExpressRoute/VPNでオンプレからのプライベート接続を実現","Service Endpointを使用してVNetからのアクセスのみ許可","ストレージアカウントを同一VNet内に移動"],ans:1,why:"Private EndpointはストレージアカウントにVNetのプライベートIPアドレスを割り当て、パブリックアクセスを無効（ネットワークアクセス拒否）にすることでインターネットからの接続をすべてブロックできる。Private DNS Zoneで元のFQDN（*.blob.core.windows.net）をプライベートIPに解決させる。ExpressRouteやVPN経由のオンプレからもプライベートIPを通してアクセスできる。",trap:"パブリックIPのファイアウォール許可はインターネット経由のため要件を満たさない。Service Endpointはストレージ側でVNetを許可するがパブリックIPは残り完全にブロックはできない。Storageは移動できないサービスでVNet内への移動という概念は存在しない。",cmp:[{svc:"Private Endpoint＋パブリック無効化",feature:"完全プライベート・オンプレ対応",rto:"設定後即時",cost:"エンドポイント料金",note:"✓ 推奨"},{svc:"Service Endpoint",feature:"ルーティング最適化",rto:"即時",cost:"無料",note:"パブリックIPが残る"},{svc:"Firewall（IP許可）",feature:"IPフィルタリング",rto:"即時",cost:"無料",note:"インターネット経由"}],kws:["Private Endpoint","パブリックアクセス無効","Private DNS Zone","ExpressRoute","オンプレミス","ストレージ"]},
  {domain:"ネットワーク",cat:"ExpressRoute",diff:"Medium",q:"ExpressRoute回路を使用してオンプレとAzureを接続している。オンプレのルーターとAzure間でBGPセッションが確立できない。考えられる原因と確認手順を選べ。",opts:["ExpressRouteはBGPを使用しないため設定が間違っている","BGPピアのIPアドレス・ASN（自律システム番号）・認証（MD5）の設定がオンプレルーターとAzure側で一致しているか確認する","帯域幅の設定を増やす","別のリージョンにExpressRoute回路を追加する"],ans:1,why:"ExpressRouteはBGP（Border Gateway Protocol）を使用してAzureとオンプレミスのルーター間でルート情報を交換する。BGPセッション確立の失敗原因として、BGPピアのIPアドレス不一致・ASN不一致・MD5認証キーの不一致が最も一般的。Azureポータルのプライベートピアリング設定とオンプレルーターの設定を比較確認する。",trap:"ExpressRouteはBGPを必須で使用するためBGP不使用という前提は誤り。帯域幅の設定はBGPセッション確立とは無関係。別リージョンへの追加はBGP問題の解決にならない。",cmp:[{svc:"BGP設定確認",feature:"ピアIP・ASN・MD5確認",rto:"診断即時",cost:"無料",note:"✓ まず確認"},{svc:"Azureポータル診断",feature:"回路・ピアリング状態確認",rto:"即時",cost:"無料",note:"設定ミスを視覚的に確認"},{svc:"プロバイダーへの問い合わせ",feature:"物理回線・プロバイダー設定確認",rto:"問い合わせ次第",cost:"無料",note:"レイヤー1/2の問題の場合"}],kws:["ExpressRoute","BGP","ASN","MD5認証","ピアリング","トラブルシューティング","BGPセッション"]},
  {domain:"ネットワーク",cat:"DDoS Protection",diff:"Medium",q:"公開WebアプリがAzure上でホストされており、大規模なDDoS攻撃への対策を強化したい。攻撃発生時の詳細なメトリクス・アラート・攻撃レポートが必要。最適なサービスは？",opts:["NSGでインターネットからのトラフィックを全てブロック","Azure DDoS Protection Standard（Network Protection）を有効化してVNetを保護","Azure Firewallをデプロイするだけで十分","Azure CDNを使用してトラフィックを分散"],ans:1,why:"Azure DDoS Protection Standard（現在はNetwork Protection）はVNetレベルで自動的にDDoS攻撃を検知・軽減する。L3/L4の攻撃に加えてApplication Gatewayと組み合わせるとL7攻撃にも対応できる。攻撃中のリアルタイムメトリクス・アラート通知・攻撃後のレポート・DRRチームのサポートが含まれる。",trap:"NSGで全インターネットトラフィックをブロックするとサービス自体が提供できない。Azure FirewallはL7フィルタリングでDDoS軽減には特化していない。CDNはトラフィック分散でDDoS緩和効果はあるがDDoS Protectionの代替ではない。",cmp:[{svc:"DDoS Protection Standard",feature:"自動軽減・メトリクス・レポート・DRR",rto:"自動検知",cost:"高（月固定）",note:"✓ 推奨"},{svc:"DDoS Basic（無料）",feature:"インフラレベルの基本保護",rto:"自動",cost:"無料",note:"詳細メトリクスなし"},{svc:"Azure Firewall",feature:"L7フィルタリング",rto:"即時",cost:"高",note:"DDoS軽減には不十分"}],kws:["DDoS Protection","Network Protection","DDoS攻撃","自動軽減","攻撃レポート","L3/L4"]},
  {domain:"ネットワーク",cat:"VNet",diff:"Medium",q:"Azure Virtual NetworkのサブネットにService Endpointを設定する主な目的と効果を正しく説明しているのはどれか？",opts:["サブネット内のVMにプライベートIPを割り当てるための機能","VNetのトラフィックをAzureサービス（StorageやSQL DBなど）に対してMicrosoftのバックボーンネットワーク経由でルーティングし、サービス側でVNetのトラフィックのみを許可できるようにする","AzureサービスにプライベートIPアドレスを割り当てる","VNet間のトラフィックを暗号化する"],ans:1,why:"Service EndpointはVNetのサブネットからAzureサービス（Storage・SQL DB・Key Vaultなど）へのトラフィックをインターネットではなくMicrosoftのバックボーンネットワーク経由にルーティングする。AzureサービスのファイアウォールでVNetのソースを許可することで、特定VNetからのトラフィックのみを受け付けることができる。ただしAzureサービス側のパブリックIPは変わらない（プライベートIPは付与されない）。",trap:"プライベートIPの割り当てはPrivate Endpointの機能。VNet間通信の暗号化はVPN Gatewayの機能。Service EndpointはVMへのIPアドレス割り当てとは無関係。",cmp:[{svc:"Service Endpoint",feature:"バックボーン経由ルーティング・ソースIP制限",rto:"即時",cost:"無料",note:"✓ ルーティング最適化"},{svc:"Private Endpoint",feature:"プライベートIPで接続・完全非公開",rto:"即時",cost:"有料",note:"よりセキュアなアクセス"},{svc:"VNet Peering",feature:"VNet間接続",rto:"設定後即時",cost:"転送量",note:"Azureサービスアクセスとは別"}],kws:["Service Endpoint","バックボーン","ファイアウォール","VNet","Azureサービス","ルーティング"]},
  {domain:"ネットワーク",cat:"Application Gateway",diff:"Hard",q:"Azure Application GatewayでWebアプリのHTTPSトラフィックを処理している。バックエンドのVMはHTTPで通信し、クライアントとの間のSSL終端をApplication Gatewayで行っている。加えてSQLインジェクションやクロスサイトスクリプティング（XSS）攻撃からWebアプリを保護したい。必要な設定は？",opts:["Application GatewayにAzure DDoS Protectionを追加","Application GatewayのWAF（Web Application Firewall）機能を有効化してOWASP CRS（コアルールセット）を適用","NSGでSQLインジェクションのパターンをブロック","Application Gatewayの後ろにAzure Firewallを配置"],ans:1,why:"Application GatewayのWAF（WAF v2 SKU）はOWASP Core Rule Setに基づいてSQLインジェクション・XSS・その他の一般的なWebアタックを自動的に検知・ブロックする。SSL終端はすでにApplication Gatewayで行っているため、WAFがHTTP/HTTPSコンテンツを検査できる（暗号化済みのトラフィックは検査不可）。",trap:"DDoS ProtectionはL3/L4のボリューム攻撃向けでSQLインジェクション等L7アタックはブロックできない。NSGはL4のIPとポートベースでHTTPペイロードの内容を解析できない。Azure FirewallはFQDNフィルタリング等のL7だがOWASP CRSのような詳細なWebアタック検知には特化していない。",cmp:[{svc:"Application Gateway WAF",feature:"OWASP CRS・SQLi・XSS検知",rto:"即時",cost:"WAF v2 SKU料金",note:"✓ 推奨"},{svc:"Azure DDoS Protection",feature:"L3/L4ボリューム攻撃軽減",rto:"自動",cost:"高",note:"L7アタックには対応しない"},{svc:"Azure Firewall Premium",feature:"IDPS・TLS検査",rto:"即時",cost:"最高",note:"Webアプリ向けにはGW WAFが適切"}],kws:["Application Gateway","WAF","OWASP","CRS","SQLインジェクション","XSS","SSL終端","WAF v2"]},
